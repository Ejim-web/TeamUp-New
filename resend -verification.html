<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeamUp - Resend Verification Email</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 40px 30px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 {
            color: #ee5a24;
            margin-bottom: 10px;
        }
        p {
            color: #666;
            margin-bottom: 30px;
        }
        input {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #ee5a24;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 12px;
            font-size: 14px;
        }
        .success {
            background: #e6ffe6;
            color: green;
        }
        .error {
            background: #ffe6e6;
            color: red;
        }
        .info {
            background: #e6f0ff;
            color: #0066cc;
        }
        hr {
            margin: 20px 0;
            border: none;
            border-top: 1px solid #eee;
        }
        .note {
            font-size: 12px;
            color: #999;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>TeamUp</h1>
        <p>Resend Verification Email</p>
        
        <input type="email" id="email" placeholder="Your email address" autocomplete="email">
        <input type="password" id="password" placeholder="Your password" autocomplete="current-password">
        
        <button id="resendBtn">Send Verification Email</button>
        
        <div id="message" class="message" style="display: none;"></div>
        
        <hr>
        <div class="note">
            This will send a fresh verification link to your inbox.<br>
            After verifying, return to the app and log in normally.
        </div>
    </div>

    <script>
        // Firebase configuration (same as your TeamUp project)
        const firebaseConfig = {
            apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
            authDomain: "teamup-68a21.firebaseapp.com",
            projectId: "teamup-68a21",
            storageBucket: "teamup-68a21.firebasestorage.app",
            messagingSenderId: "379106762572",
            appId: "1:379106762572:web:b80b61d82df788cc0339e9"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const resendBtn = document.getElementById('resendBtn');
        const messageDiv = document.getElementById('message');

        function showMessage(text, type) {
            messageDiv.style.display = 'block';
            messageDiv.className = `message ${type}`;
            messageDiv.innerText = text;
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }

        resendBtn.onclick = async () => {
            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                showMessage('Please enter both email and password.', 'error');
                return;
            }

            resendBtn.disabled = true;
            resendBtn.innerText = 'Processing...';

            try {
                // Sign in the user (temporarily) – this will succeed even if email is not verified
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const user = userCredential.user;

                if (user.emailVerified) {
                    showMessage('This email is already verified. You can log in directly.', 'info');
                    // Sign out immediately
                    await auth.signOut();
                    resendBtn.disabled = false;
                    resendBtn.innerText = 'Send Verification Email';
                    return;
                }

                // Send verification email
                await user.sendEmailVerification();
                showMessage(`✅ Verification email sent to ${email}. Please check your inbox (and spam folder).`, 'success');

                // Sign out
                await auth.signOut();
            } catch (error) {
                let errorMsg = error.message;
                if (error.code === 'auth/user-not-found') {
                    errorMsg = 'No account found with this email. Please sign up first.';
                } else if (error.code === 'auth/wrong-password') {
                    errorMsg = 'Incorrect password. Please try again.';
                }
                showMessage(`❌ ${errorMsg}`, 'error');
            } finally {
                resendBtn.disabled = false;
                resendBtn.innerText = 'Send Verification Email';
            }
        };
    </script>
</body>
</html>
