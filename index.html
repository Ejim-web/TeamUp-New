<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TeamUp - Dating App</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #ee5a24, #ff6b6b);
            min-height: 100vh;
        }

        /* Auth Screen */
        .auth-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .auth-card {
            background: white;
            border-radius: 32px;
            padding: 40px 30px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .auth-card h1 {
            color: #ee5a24;
            font-size: 36px;
            margin-bottom: 10px;
        }
        .auth-card p {
            color: #666;
            margin-bottom: 25px;
        }
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }
        .tab {
            flex: 1;
            padding: 12px;
            cursor: pointer;
            border-radius: 12px;
            background: #f0f0f0;
            font-weight: bold;
            transition: all 0.3s;
        }
        .tab.active {
            background: #ee5a24;
            color: white;
        }
        input,
        textarea {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus,
        textarea:focus {
            outline: none;
            border-color: #ee5a24;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ee5a24, #ff6b6b);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s, opacity 0.2s;
        }
        button:active {
            transform: scale(0.98);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .hidden {
            display: none;
        }
        .error {
            background: #ffe6e6;
            color: red;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
        }
        .success {
            background: #e6ffe6;
            color: green;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
        }

        .interest-chip {
            display: inline-block;
            padding: 8px 16px;
            background: #f0f0f0;
            border-radius: 20px;
            margin: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .interest-chip.selected {
            background: #ee5a24;
            color: white;
        }

        /* App Layout */
        .app {
            display: none;
            max-width: 450px;
            margin: 0 auto;
            background: #f8f9fa;
            min-height: 100vh;
            position: relative;
        }
        .header {
            background: white;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .header h2 {
            color: #ee5a24;
            font-size: 24px;
        }
        .header-buttons {
            display: flex;
            gap: 8px;
        }
        .icon-btn {
            width: auto;
            padding: 8px 14px;
            margin: 0;
            background: #f0f0f0;
            color: #333;
            font-size: 14px;
        }

        /* Navigation */
        .nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 450px;
            margin: 0 auto;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 10px 12px;
            border-top: 1px solid #eee;
            z-index: 100;
        }
        .nav-item {
            text-align: center;
            cursor: pointer;
            padding: 8px;
            border-radius: 16px;
            color: #666;
            font-size: 24px;
            position: relative;
            transition: all 0.3s;
        }
        .nav-item.active {
            color: #ee5a24;
            background: rgba(238, 90, 36, 0.1);
        }
        .nav-item span {
            font-size: 11px;
            display: block;
            margin-top: 2px;
        }
        .badge-count {
            position: absolute;
            top: -5px;
            right: -10px;
            background: #f44336;
            color: white;
            border-radius: 12px;
            padding: 2px 6px;
            font-size: 10px;
            min-width: 18px;
            text-align: center;
        }

        /* Pages */
        .page {
            display: none;
            padding: 20px;
            padding-bottom: 85px;
        }
        .page.active {
            display: block;
        }

        /* Swipe Cards */
        .swipe-container {
            padding-bottom: 20px;
        }
        .swipe-card {
            background: white;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
            margin-bottom: 15px;
        }
        .card-img {
            height: 400px;
            background: linear-gradient(135deg, #ee5a24, #ff6b6b);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            color: white;
            overflow: hidden;
            position: relative;
        }
        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .photo-nav {
            position: absolute;
            bottom: 10px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.5);
            padding: 8px;
        }
        .photo-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: all 0.3s;
        }
        .photo-dot.active {
            background: white;
        }
        .photo-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            z-index: 5;
            transition: background 0.3s;
        }
        .photo-arrow:hover {
            background: rgba(0, 0, 0, 0.7);
        }
        .photo-arrow.left {
            left: 10px;
        }
        .photo-arrow.right {
            right: 10px;
        }
        .card-info {
            padding: 20px;
        }
        .card-name {
            font-size: 26px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-age {
            font-size: 22px;
            font-weight: normal;
            color: #666;
        }
        .card-distance {
            font-size: 13px;
            color: #666;
            margin: 6px 0;
        }
        .badge {
            display: inline-block;
            padding: 5px 12px;
            background: rgba(238, 90, 36, 0.1);
            border-radius: 20px;
            font-size: 12px;
            margin: 3px;
            color: #ee5a24;
            font-weight: bold;
        }
        .card-bio {
            margin-top: 10px;
            color: #666;
            font-size: 14px;
        }

        /* Direct Message Area on Swipe Card */
        .direct-message-area {
            padding: 12px 18px 18px;
            border-top: 1px solid #eee;
            background: white;
        }
        .message-input-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .message-input-wrapper input {
            flex: 1;
            margin: 0;
            padding: 12px 16px;
            border-radius: 30px;
            background: #f0f0f0;
            border: none;
            font-size: 14px;
        }
        .message-input-wrapper input:focus {
            outline: none;
            background: #e8e8e8;
        }
        .send-msg-btn {
            width: auto;
            margin: 0;
            padding: 12px 22px;
            border-radius: 30px;
            background: #ee5a24;
            font-size: 14px;
        }

        /* Swipe Buttons */
        .swipe-buttons {
            display: flex;
            justify-content: center;
            gap: 25px;
            padding: 0 15px 10px;
        }
        .swipe-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 28px;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            transition: transform 0.2s;
        }
        .swipe-btn:active {
            transform: scale(0.92);
        }
        .like {
            background: #4caf50;
            color: white;
        }
        .pass {
            background: #f44336;
            color: white;
        }

        /* Match Cards */
        .match-card {
            background: white;
            border-radius: 20px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            border: 1px solid #eee;
            transition: all 0.2s;
        }
        .match-card:active {
            transform: scale(0.98);
        }
        .match-avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ee5a24, #ff6b6b);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            flex-shrink: 0;
        }
        .match-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .match-info {
            flex: 1;
            min-width: 0;
        }
        .match-name {
            font-weight: bold;
            font-size: 17px;
        }
        .match-last-msg {
            font-size: 13px;
            color: #666;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .match-unread {
            background: #f44336;
            color: white;
            border-radius: 10px;
            padding: 2px 8px;
            font-size: 11px;
            margin-left: 8px;
        }

        /* Profile */
        .profile-card {
            background: white;
            border-radius: 24px;
            padding: 25px;
            text-align: center;
        }
        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50px;
            margin: 0 auto 15px;
            border: 3px solid #ee5a24;
            overflow: hidden;
            background: linear-gradient(135deg, #ee5a24, #ff6b6b);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            cursor: pointer;
        }
        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .photos-grid {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            margin: 15px 0;
            padding-bottom: 10px;
        }
        .photo-item {
            position: relative;
            width: 80px;
            height: 80px;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #ee5a24;
            flex-shrink: 0;
        }
        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .photo-item.main {
            border-color: #4caf50;
        }
        .delete-photo {
            position: absolute;
            top: 3px;
            right: 3px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .set-main {
            position: absolute;
            bottom: 3px;
            left: 3px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 2px 6px;
            font-size: 9px;
            cursor: pointer;
        }

        /* Chat Page */
        #chatPage {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            max-width: 450px;
            margin: 0 auto;
            background: #f8f9fa;
            z-index: 30;
            display: none;
            flex-direction: column;
        }
        #chatPage.active {
            display: flex;
        }
        .chat-header {
            background: white;
            padding: 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #eee;
            flex-shrink: 0;
        }
        .back-btn {
            background: transparent;
            width: auto;
            padding: 8px 12px;
            margin: 0;
            font-size: 18px;
            cursor: pointer;
            color: #333;
            border: none;
        }
        .chat-header-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 10px;
        }
        .chat-header-info {
            flex: 1;
        }
        .chat-header-name {
            font-weight: bold;
            font-size: 17px;
        }
        .chat-status {
            font-size: 12px;
            color: #4caf50;
        }
        .chat-status.offline {
            color: #999;
        }
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .message-row {
            display: flex;
            width: 100%;
        }
        .message-row.sent {
            justify-content: flex-end;
        }
        .message-row.received {
            justify-content: flex-start;
        }
        .bubble {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 20px;
            word-wrap: break-word;
        }
        .bubble.sent {
            background: #ee5a24;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .bubble.received {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
        }
        .message-time {
            font-size: 10px;
            opacity: 0.7;
            margin-top: 4px;
            text-align: right;
        }
        .input-area {
            display: flex;
            gap: 8px;
            padding: 12px;
            background: white;
            border-top: 1px solid #eee;
            flex-shrink: 0;
        }
        .input-area input {
            flex: 1;
            margin: 0;
            padding: 12px;
            border-radius: 25px;
            background: #f0f0f0;
            border: none;
            font-size: 15px;
        }
        .input-area input:focus {
            outline: none;
            background: #e8e8e8;
        }
        .input-area button {
            width: auto;
            margin: 0;
            padding: 12px 20px;
        }
        .empty {
            text-align: center;
            color: #999;
            padding: 60px 20px;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 1000;
            animation: fadeOut 2.5s ease;
        }
        @keyframes fadeOut {
            0% {
                opacity: 1;
                bottom: 80px;
            }
            70% {
                opacity: 1;
                bottom: 80px;
            }
            100% {
                opacity: 0;
                bottom: 60px;
            }
        }
    </style>
</head>
<body>

    <!-- Auth Screen -->
    <div id="authScreen" class="auth-screen">
        <div class="auth-card">
            <h1>🔥 TeamUp</h1>
            <p>Find your perfect match</p>
            <div class="tabs">
                <div class="tab active" id="loginTab">Login</div>
                <div class="tab" id="signupTab">Sign Up</div>
            </div>
            <div id="loginDiv">
                <input type="email" id="loginEmail" placeholder="Email">
                <input type="password" id="loginPassword" placeholder="Password">
                <button id="doLogin">Login</button>
                <div id="loginMsg"></div>
            </div>
            <div id="signupDiv" class="hidden">
                <input type="text" id="signupName" placeholder="Full Name">
                <input type="number" id="signupAge" placeholder="Age">
                <input type="email" id="signupEmail" placeholder="Email">
                <input type="password" id="signupPassword" placeholder="Password">
                <textarea id="signupBio" placeholder="Bio (optional)" rows="2"></textarea>
                <div class="interests-grid" id="interestsGrid">
                    <span class="interest-chip" data-int="Dating">❤️ Dating</span>
                    <span class="interest-chip" data-int="Friendship">👥 Friendship</span>
                    <span class="interest-chip" data-int="Serious">💍 Serious</span>
                    <span class="interest-chip" data-int="Gaming">🎮 Gaming</span>
                </div>
                <button id="doSignup">Create Account</button>
                <div id="signupMsg"></div>
            </div>
        </div>
    </div>

    <!-- App -->
    <div id="app" class="app">
        <div class="header">
            <h2>🔥 TeamUp</h2>
            <div class="header-buttons">
                <button class="icon-btn" id="logoutBtn">Logout</button>
            </div>
        </div>

        <div id="swipePage" class="page active">
            <div class="swipe-container">
                <div id="cards"><div class="empty">Loading profiles...</div></div>
            </div>
            <div class="swipe-buttons">
                <button class="swipe-btn pass" id="passBtn">✗</button>
                <button class="swipe-btn like" id="likeBtn">♥</button>
            </div>
        </div>

        <div id="matchesPage" class="page">
            <div id="matchesList"><div class="empty">💬 No conversations yet. Send a message!</div></div>
        </div>

        <div id="profilePage" class="page">
            <div class="profile-card">
                <div class="profile-avatar" id="profileAvatar">👤</div>
                <h2 id="profileName"></h2>
                <p id="profileEmail"></p>
                <p id="profileBio"></p>
                <div id="profileInterests"></div>
                <button id="editProfileBtn" style="background:#f0f0f0; color:#333; margin-top:15px;">✏️ Edit Profile</button>
                <div style="margin-top:20px; padding-top:20px; border-top:1px solid #eee;">
                    <button id="resetSwipesBtn" style="background:#f44336;">🔄 Reset All Swipes</button>
                </div>
            </div>
        </div>

        <!-- Chat Page -->
        <div id="chatPage">
            <div class="chat-header">
                <button class="back-btn" id="chatBackBtn">← Back</button>
                <img id="chatHeaderAvatar" class="chat-header-avatar" src="">
                <div class="chat-header-info">
                    <div class="chat-header-name" id="chatPartnerName"></div>
                    <div class="chat-status" id="chatStatus">Online</div>
                </div>
            </div>
            <div id="messagesContainer" class="messages-container"></div>
            <div class="input-area">
                <input type="text" id="chatInput" placeholder="Type a message..." autocomplete="off">
                <button id="sendChatBtn">Send</button>
            </div>
        </div>

        <!-- Navigation -->
        <div class="nav">
            <div class="nav-item active" data-page="swipe">🔥<span>Swipe</span></div>
            <div class="nav-item" data-page="matches">💬<span>Messages</span><span id="unreadBadge" class="badge-count hidden"></span></div>
            <div class="nav-item" data-page="profile">👤<span>Profile</span></div>
        </div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
            authDomain: "teamup-68a21.firebaseapp.com",
            projectId: "teamup-68a21",
            storageBucket: "teamup-68a21.firebasestorage.app",
            messagingSenderId: "379106762572",
            appId: "1:379106762572:web:b80b61d82df788cc0339e9"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // State
        let currentUser = null;
        let currentProfile = null;
        let usersList = [];
        let currentSwipeIndex = 0;
        let currentChatMatchId = null;
        let currentChatOtherId = null;
        let messagesUnsubscribe = null;
        let selectedInterests = [];

        // Helper Functions
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
        }

        function showToast(msg) {
            let toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        function showError(msg) {
            showToast('⚠️ ' + msg);
        }

        // Send Direct Message (Creates conversation for both users)
        async function sendDirectMessage(targetUserId, targetName, text) {
            if (!text.trim()) { showToast("Please write a message"); return false; }
            if (!currentUser) { showToast("Please login first"); return false; }

            try {
                const matchId = [currentUser.uid, targetUserId].sort().join('_');
                const matchRef = db.collection('matches').doc(matchId);
                const matchDoc = await matchRef.get();

                if (!matchDoc.exists) {
                    // Create conversation
                    await matchRef.set({
                        id: matchId,
                        user1: currentUser.uid,
                        user2: targetUserId,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                        lastMessage: text.substring(0, 50),
                        lastMessageTime: firebase.firestore.FieldValue.serverTimestamp(),
                        unread1: 0,
                        unread2: 0
                    });

                    // Add to current user's matches
                    await db.collection('users').doc(currentUser.uid).update({
                        matches: firebase.firestore.FieldValue.arrayUnion(matchId)
                    });

                    // Add to recipient's matches - CRITICAL for them to see it
                    await db.collection('users').doc(targetUserId).update({
                        matches: firebase.firestore.FieldValue.arrayUnion(matchId)
                    });

                    if (!currentProfile.matches) currentProfile.matches = [];
                    currentProfile.matches.push(matchId);
                }

                // Add message
                const messagesRef = matchRef.collection('messages');
                await messagesRef.add({
                    text: text,
                    senderId: currentUser.uid,
                    receiverId: targetUserId,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    seen: false
                });

                // Update last message
                await matchRef.update({
                    lastMessage: text.substring(0, 50),
                    lastMessageTime: firebase.firestore.FieldValue.serverTimestamp()
                });

                // Increment unread for recipient
                const unreadField = matchDoc.exists ?
                    (matchDoc.data().user1 === targetUserId ? 'unread1' : 'unread2') :
                    (currentUser.uid < targetUserId ? 'unread2' : 'unread1');
                await matchRef.update({ [unreadField]: firebase.firestore.FieldValue.increment(1) });

                showToast(`✅ Sent to ${targetName}!`);
                await loadMatches();
                return true;
            } catch (error) {
                console.error("Send message error:", error);
                showError("Failed to send message");
                return false;
            }
        }

        // Load Cards for Swiping
        async function loadCards() {
            try {
                const likes = currentProfile.likes || [];
                const matches = currentProfile.matches || [];
                const snapshot = await db.collection('users').where('uid', '!=', currentUser.uid).get();

                let users = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    if (!likes.includes(doc.id) && !matches.includes(doc.id)) {
                        users.push({ id: doc.id, ...data });
                    }
                });

                users = users.sort(() => Math.random() - 0.5);
                usersList = users;
                currentSwipeIndex = 0;
                showCard();
            } catch (error) {
                console.error("Load cards error:", error);
                document.getElementById('cards').innerHTML = '<div class="empty">Error loading profiles</div>';
            }
        }

        // Show Swipe Card
        function showCard() {
            if (currentSwipeIndex >= usersList.length) {
                document.getElementById('cards').innerHTML = '<div class="empty">🎉 No more profiles! Reset swipes in profile</div>';
                return;
            }

            const u = usersList[currentSwipeIndex];
            const photoUrl = u.photo_url || '';
            const photoHtml = photoUrl ?
                `<img src="${photoUrl}">` :
                '<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:64px;">👤</div>';

            document.getElementById('cards').innerHTML = `
                    <div class="swipe-card">
                        <div class="card-img">${photoHtml}</div>
                        <div class="card-info">
                            <div class="card-name">
                                ${escapeHtml(u.name)}
                                <span class="card-age">, ${u.age || '?'}</span>
                            </div>
                            <div class="card-distance">📍 Distance unknown</div>
                            <div>${(u.interests || []).map(i => `<span class="badge">${escapeHtml(i)}</span>`).join('')}</div>
                            ${u.bio ? `<div class="card-bio">${escapeHtml(u.bio.substring(0, 100))}</div>` : ''}
                        </div>
                        <div class="direct-message-area">
                            <div class="message-input-wrapper">
                                <input type="text" id="directMsgInput" placeholder="💬 Message ${escapeHtml(u.name)}..." autocomplete="off">
                                <button class="send-msg-btn" id="sendDirectMsgBtn">Send</button>
                            </div>
                        </div>
                    </div>
                `;

            // Direct message handler
            document.getElementById('sendDirectMsgBtn').onclick = async () => {
                const input = document.getElementById('directMsgInput');
                const msg = input.value.trim();
                if (msg) {
                    await sendDirectMessage(u.id, u.name, msg);
                    input.value = '';
                    currentSwipeIndex++;
                    showCard();
                }
            };
            document.getElementById('directMsgInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    document.getElementById('sendDirectMsgBtn').click();
                }
            });

            window.currentTargetUser = u;
        }

        // Like Button
        document.getElementById('likeBtn').onclick = async () => {
            if (currentSwipeIndex >= usersList.length) return;
            const u = usersList[currentSwipeIndex];

            try {
                const likes = currentProfile.likes || [];
                if (!likes.includes(u.id)) {
                    await db.collection('users').doc(currentUser.uid).update({
                        likes: firebase.firestore.FieldValue.arrayUnion(u.id)
                    });
                    currentProfile.likes.push(u.id);
                }

                // Check if they liked us back
                const userDoc = await db.collection('users').doc(u.id).get();
                const theirLikes = userDoc.data()?.likes || [];
                if (theirLikes.includes(currentUser.uid)) {
                    const matchId = [currentUser.uid, u.id].sort().join('_');
                    const matchDoc = await db.collection('matches').doc(matchId).get();
                    if (!matchDoc.exists) {
                        await db.collection('matches').doc(matchId).set({
                            id: matchId,
                            user1: currentUser.uid,
                            user2: u.id,
                            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                            updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                            unread1: 0,
                            unread2: 0
                        });
                        await db.collection('users').doc(currentUser.uid).update({
                            matches: firebase.firestore.FieldValue.arrayUnion(matchId)
                        });
                        await db.collection('users').doc(u.id).update({
                            matches: firebase.firestore.FieldValue.arrayUnion(matchId)
                        });
                        showToast(`🎉 It's a match with ${u.name}!`);
                        await loadMatches();
                    }
                }
                currentSwipeIndex++;
                showCard();
            } catch (error) {
                console.error("Like error:", error);
                showError("Failed to like");
            }
        };

        // Pass Button
        document.getElementById('passBtn').onclick = () => {
            if (currentSwipeIndex < usersList.length) {
                currentSwipeIndex++;
                showCard();
            }
        };

        // Load Matches
        async function loadMatches() {
            if (!currentProfile) return;
            const matchIds = currentProfile.matches || [];

            if (matchIds.length === 0) {
                document.getElementById('matchesList').innerHTML = '<div class="empty">💬 No conversations yet. Send a message while swiping!</div>';
                return;
            }

            let html = '';
            for (const matchId of matchIds) {
                const ids = matchId.split('_');
                const otherId = ids[0] === currentUser.uid ? ids[1] : ids[0];
                const otherDoc = await db.collection('users').doc(otherId).get();
                if (!otherDoc.exists) continue;

                const other = otherDoc.data();
                const matchDoc = await db.collection('matches').doc(matchId).get();
                const data = matchDoc.data();
                const lastMsg = data?.lastMessage || 'Tap to chat';
                const unread = data?.user1 === currentUser.uid ? (data.unread1 || 0) : (data.unread2 || 0);
                const unreadBadge = unread > 0 ? `<span class="match-unread">${unread}</span>` : '';

                html += `
                        <div class="match-card" onclick="openChat('${matchId}', '${otherId}')">
                            <div class="match-avatar">
                                ${other.photo_url ? `<img src="${other.photo_url}">` : '👤'}
                            </div>
                            <div class="match-info">
                                <div class="match-name">${escapeHtml(other.name)} ${unreadBadge}</div>
                                <div class="match-last-msg">${escapeHtml(lastMsg)}</div>
                            </div>
                        </div>
                    `;
            }
            document.getElementById('matchesList').innerHTML = html;
            await updateUnreadBadge();
        }

        // Update Unread Badge
        async function updateUnreadBadge() {
            if (!currentProfile?.matches) return;
            let total = 0;
            for (const matchId of currentProfile.matches) {
                const doc = await db.collection('matches').doc(matchId).get();
                if (doc.exists) {
                    const data = doc.data();
                    const unread = data.user1 === currentUser.uid ? (data.unread1 || 0) : (data.unread2 || 0);
                    total += unread;
                }
            }
            const badge = document.getElementById('unreadBadge');
            if (total > 0) {
                badge.innerText = total > 9 ? '9+' : total;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        // Open Chat
        window.openChat = async function(matchId, otherId) {
            if (messagesUnsubscribe) messagesUnsubscribe();
            currentChatMatchId = matchId;
            currentChatOtherId = otherId;

            const otherDoc = await db.collection('users').doc(otherId).get();
            const other = otherDoc.data();
            document.getElementById('chatPartnerName').innerText = other.name;
            document.getElementById('chatHeaderAvatar').src = other.photo_url || '';

            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('chatPage').classList.add('active');

            // Mark messages as read
            const matchRef = db.collection('matches').doc(matchId);
            const matchDoc = await matchRef.get();
            if (matchDoc.exists) {
                const data = matchDoc.data();
                if (data.user1 === currentUser.uid) {
                    await matchRef.update({ unread1: 0 });
                } else {
                    await matchRef.update({ unread2: 0 });
                }
            }
            await updateUnreadBadge();
            await loadMatches();

            // Listen for messages
            const messagesRef = matchRef.collection('messages');
            const container = document.getElementById('messagesContainer');

            messagesUnsubscribe = messagesRef.orderBy('createdAt', 'asc').onSnapshot((snapshot) => {
                if (snapshot.empty) {
                    container.innerHTML = '<div class="empty">💬 No messages yet. Say hello! 👋</div>';
                    return;
                }
                container.innerHTML = '';
                snapshot.forEach(doc => {
                    const msg = doc.data();
                    const isSent = msg.senderId === currentUser.uid;
                    const row = document.createElement('div');
                    row.className = `message-row ${isSent ? 'sent' : 'received'}`;
                    const time = msg.createdAt?.toDate ? formatTime(msg.createdAt) : '';
                    row.innerHTML = `
                            <div class="bubble ${isSent ? 'sent' : 'received'}">
                                ${escapeHtml(msg.text)}
                                <div class="message-time">${time}</div>
                            </div>
                        `;
                    container.appendChild(row);
                });
                container.scrollTop = container.scrollHeight;

                // Mark messages as seen
                snapshot.docChanges().forEach(async (change) => {
                    if (change.type === 'added') {
                        const msg = change.doc.data();
                        if (msg.receiverId === currentUser.uid && !msg.seen) {
                            await change.doc.ref.update({ seen: true });
                        }
                    }
                });
            });
        };

        // Format Time
        function formatTime(timestamp) {
            if (!timestamp) return '';
            const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        // Send Chat Message
        document.getElementById('sendChatBtn').onclick = async () => {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text || !currentChatMatchId) return;

            const matchRef = db.collection('matches').doc(currentChatMatchId);
            const messagesRef = matchRef.collection('messages');
            await messagesRef.add({
                text: text,
                senderId: currentUser.uid,
                receiverId: currentChatOtherId,
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                seen: false
            });

            const matchDoc = await matchRef.get();
            const data = matchDoc.data();
            const unreadField = data.user1 === currentChatOtherId ? 'unread1' : 'unread2';
            await matchRef.update({
                lastMessage: text.substring(0, 50),
                lastMessageTime: firebase.firestore.FieldValue.serverTimestamp(),
                [unreadField]: firebase.firestore.FieldValue.increment(1)
            });

            input.value = '';
            await updateUnreadBadge();
            loadMatches();
        };

        document.getElementById('chatInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('sendChatBtn').click();
        });

        document.getElementById('chatBackBtn').onclick = () => {
            if (messagesUnsubscribe) messagesUnsubscribe();
            document.getElementById('chatPage').classList.remove('active');
            document.getElementById('matchesPage').classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.querySelector('.nav-item[data-page="matches"]').classList.add('active');
            loadMatches();
        };

        // Profile Functions
        function updateProfileUI() {
            if (!currentProfile) return;
            document.getElementById('profileName').innerText = currentProfile.name;
            document.getElementById('profileEmail').innerText = currentUser.email;
            document.getElementById('profileBio').innerText = currentProfile.bio || 'No bio yet';
            document.getElementById('profileInterests').innerHTML = (currentProfile.interests || [])
                .map(i => `<span class="badge">${escapeHtml(i)}</span>`).join('');
            if (currentProfile.photo_url) {
                document.getElementById('profileAvatar').innerHTML = `<img src="${currentProfile.photo_url}">`;
            }
        }

        document.getElementById('editProfileBtn').onclick = async () => {
            const newBio = prompt('Edit bio', currentProfile.bio);
            if (newBio !== null) {
                await db.collection('users').doc(currentUser.uid).update({ bio: newBio });
                currentProfile.bio = newBio;
                updateProfileUI();
                showToast('✅ Profile updated!');
            }
        };

        document.getElementById('resetSwipesBtn').onclick = async () => {
            if (confirm('Reset all swipes? (Your messages will NOT be deleted)')) {
                await db.collection('users').doc(currentUser.uid).update({ likes: [] });
                currentProfile.likes = [];
                loadCards();
                showToast('✅ Swipes reset!');
            }
        };

        // Navigation
        document.querySelectorAll('.nav-item').forEach(item => {
            item.onclick = () => {
                const page = item.dataset.page;
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                item.classList.add('active');
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                if (page === 'swipe') document.getElementById('swipePage').classList.add('active');
                if (page === 'matches') {
                    document.getElementById('matchesPage').classList.add('active');
                    loadMatches();
                }
                if (page === 'profile') document.getElementById('profilePage').classList.add('active');
            };
        });

        // Real-time Profile Listener
        function setupProfileListener() {
            if (!currentUser) return;
            db.collection('users').doc(currentUser.uid).onSnapshot((doc) => {
                if (doc.exists) {
                    const data = doc.data();
                    const oldMatches = currentProfile?.matches || [];
                    const newMatches = data.matches || [];
                    currentProfile = data;
                    if (!currentProfile.likes) currentProfile.likes = [];
                    if (!currentProfile.matches) currentProfile.matches = [];
                    updateProfileUI();
                    if (JSON.stringify(oldMatches) !== JSON.stringify(newMatches)) {
                        loadMatches();
                        updateUnreadBadge();
                    }
                }
            });
        }

        // Logout
        document.getElementById('logoutBtn').onclick = async () => {
            if (messagesUnsubscribe) messagesUnsubscribe();
            await auth.signOut();
            location.reload();
        };

        // Auth - Signup
        document.querySelectorAll('#interestsGrid .interest-chip').forEach(c => {
            c.onclick = () => {
                c.classList.toggle('selected');
                const v = c.dataset.int;
                if (selectedInterests.includes(v)) {
                    selectedInterests = selectedInterests.filter(i => i !== v);
                } else {
                    selectedInterests.push(v);
                }
            };
        });

        document.getElementById('signupTab').onclick = () => {
            document.getElementById('signupTab').classList.add('active');
            document.getElementById('loginTab').classList.remove('active');
            document.getElementById('signupDiv').classList.remove('hidden');
            document.getElementById('loginDiv').classList.add('hidden');
        };
        document.getElementById('loginTab').onclick = () => {
            document.getElementById('loginTab').classList.add('active');
            document.getElementById('signupTab').classList.remove('active');
            document.getElementById('loginDiv').classList.remove('hidden');
            document.getElementById('signupDiv').classList.add('hidden');
        };

        document.getElementById('doSignup').onclick = async () => {
            const name = document.getElementById('signupName').value.trim();
            const age = parseInt(document.getElementById('signupAge').value);
            const email = document.getElementById('signupEmail').value.trim();
            const pwd = document.getElementById('signupPassword').value;
            const bio = document.getElementById('signupBio').value;

            if (!name || !age || !email || !pwd) return alert('Fill all fields');
            if (selectedInterests.length === 0) return alert('Select at least one interest');
            if (age < 18) return alert('Must be 18+');

            try {
                const cred = await auth.createUserWithEmailAndPassword(email, pwd);
                await db.collection('users').doc(cred.user.uid).set({
                    uid: cred.user.uid,
                    name,
                    age,
                    bio: bio || '',
                    interests: selectedInterests,
                    photo_url: '',
                    likes: [],
                    matches: []
                });
                alert('✅ Account created! Please login.');
                document.getElementById('signupDiv').classList.add('hidden');
                document.getElementById('loginDiv').classList.remove('hidden');
            } catch (e) {
                alert('❌ ' + e.message);
            }
        };

        // Auth - Login
        document.getElementById('doLogin').onclick = async () => {
            const email = document.getElementById('loginEmail').value;
            const pwd = document.getElementById('loginPassword').value;

            try {
                const cred = await auth.signInWithEmailAndPassword(email, pwd);
                currentUser = cred.user;
                const doc = await db.collection('users').doc(currentUser.uid).get();
                if (!doc.exists) throw new Error('No profile found');

                currentProfile = doc.data();
                if (!currentProfile.likes) currentProfile.likes = [];
                if (!currentProfile.matches) currentProfile.matches = [];

                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('app').style.display = 'block';

                updateProfileUI();
                loadCards();
                loadMatches();
                setupProfileListener();
                updateUnreadBadge();
            } catch (e) {
                alert('❌ Login failed: ' + e.message);
            }
        };

        // Auto-login on page load
        auth.onAuthStateChanged(async user => {
            if (user && !currentUser) {
                currentUser = user;
                const doc = await db.collection('users').doc(user.uid).get();
                if (doc.exists) {
                    currentProfile = doc.data();
                    if (!currentProfile.likes) currentProfile.likes = [];
                    if (!currentProfile.matches) currentProfile.matches = [];

                    document.getElementById('authScreen').style.display = 'none';
                    document.getElementById('app').style.display = 'block';

                    updateProfileUI();
                    loadCards();
                    loadMatches();
                    setupProfileListener();
                    updateUnreadBadge();
                }
            }
        });
    </script>
</body>
</html>
