<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TeamUp - Dating App</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            min-height: 100vh;
        }
        .auth-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .auth-card {
            background: white;
            border-radius: 24px;
            padding: 40px 30px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 { color: #ee5a24; margin-bottom: 10px; }
        .tabs { display: flex; gap: 12px; margin-bottom: 30px; }
        .tab {
            flex: 1;
            padding: 12px;
            cursor: pointer;
            border-radius: 12px;
            background: #f0f0f0;
            font-weight: bold;
            color: #333;
        }
        .tab.active {
            background: #ee5a24;
            color: white;
        }
        input, textarea, select {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #ee5a24;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .hidden { display: none; }
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            z-index: 2000;
            animation: fadeOut 3s ease;
            white-space: nowrap;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        .verify-banner {
            background: #ff9800;
            color: white;
            padding: 12px;
            text-align: center;
            font-size: 13px;
            margin-bottom: 10px;
        }
        .verify-banner button {
            background: white;
            color: #ff9800;
            padding: 5px 15px;
            margin-left: 10px;
            width: auto;
            border-radius: 20px;
        }
        .app {
            display: none;
            max-width: 500px;
            margin: 0 auto;
            background: #f5f5f5;
            min-height: 100vh;
        }
        .header {
            background: white;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ddd;
        }
        .header h2 { color: #ee5a24; margin: 0; }
        .logout-btn {
            width: auto;
            padding: 8px 16px;
            background: #f0f0f0;
            color: #666;
            margin-top: 0;
        }
        .nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 500px;
            margin: 0 auto;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 12px;
            border-top: 1px solid #ddd;
            z-index: 200;
        }
        .nav-item {
            text-align: center;
            cursor: pointer;
            padding: 8px;
            border-radius: 16px;
            font-size: 24px;
            min-width: 60px;
        }
        .nav-item span {
            font-size: 11px;
            display: block;
            margin-top: 4px;
        }
        .nav-item.active {
            color: #ee5a24;
            background: rgba(238,90,36,0.1);
        }
        .page {
            display: none;
            padding: 20px;
            padding-bottom: 85px;
        }
        .page.active { display: block; }
        .swipe-card {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .card-img {
            height: 450px;
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            color: white;
        }
        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .card-info { padding: 20px; }
        .card-name { font-size: 28px; font-weight: bold; }
        .badge {
            display: inline-block;
            padding: 6px 14px;
            background: #f0f0f0;
            border-radius: 20px;
            font-size: 12px;
            margin: 3px;
            color: #ee5a24;
            font-weight: bold;
        }
        .swipe-buttons {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
        }
        .swipe-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            font-size: 32px;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }
        .like { background: #4caf50; color: white; }
        .pass { background: #f44336; color: white; }
        .match-card {
            background: white;
            border-radius: 20px;
            padding: 18px;
            display: flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 15px;
            cursor: pointer;
            border: 1px solid #ddd;
        }
        .match-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            overflow: hidden;
        }
        .match-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .profile-card {
            background: white;
            border-radius: 24px;
            padding: 30px;
            text-align: center;
        }
        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 60px;
            margin: 0 auto 20px;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            cursor: pointer;
            overflow: hidden;
        }
        .interests-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 10px 0;
        }
        .interest-chip {
            padding: 8px 16px;
            background: #f0f0f0;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }
        .interest-chip.selected {
            background: #ee5a24;
            color: white;
        }
        .empty {
            text-align: center;
            color: #999;
            padding: 60px 20px;
        }
    </style>
</head>
<body>

<!-- Authentication Screen -->
<div id="authScreen" class="auth-screen">
    <div class="auth-card">
        <h1>TeamUp</h1>
        <p>Find your perfect match</p>
        <div class="tabs">
            <div class="tab active" id="loginTab">Login</div>
            <div class="tab" id="signupTab">Sign Up</div>
        </div>
        <div id="loginDiv">
            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginPassword" placeholder="Password">
            <button id="doLogin">Login</button>
            <div id="loginMsg"></div>
        </div>
        <div id="signupDiv" class="hidden">
            <input type="text" id="signupName" placeholder="Full Name">
            <input type="number" id="signupAge" placeholder="Age">
            <input type="email" id="signupEmail" placeholder="Email">
            <input type="password" id="signupPassword" placeholder="Password">
            <textarea id="signupBio" placeholder="Bio (optional)" rows="2"></textarea>
            <select id="signupGoal">
                <option value="None">Relationship Goal</option>
                <option value="Marriage">Marriage</option>
                <option value="Family">Family</option>
                <option value="Casual">Casual</option>
                <option value="Friendship">Friendship</option>
            </select>
            <div class="interests-grid" id="interestsGrid">
                <span class="interest-chip" data-int="dating">❤️ Dating</span>
                <span class="interest-chip" data-int="friendship">👥 Friendship</span>
                <span class="interest-chip" data-int="gaming">🎮 Gaming</span>
                <span class="interest-chip" data-int="study">📚 Study</span>
                <span class="interest-chip" data-int="business">💼 Business</span>
            </div>
            <button id="doSignup">Create Account</button>
            <div id="signupMsg"></div>
        </div>
    </div>
</div>

<!-- Main App (hidden until email verified) -->
<div id="app" class="app">
    <div class="header">
        <h2>TeamUp</h2>
        <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>
    <div id="verifyBanner" class="verify-banner" style="display: none;">
        ⚠️ Email not verified. Check your inbox/spam or 
        <button id="resendVerificationBtn">Resend Email</button>
    </div>
    <div id="swipePage" class="page active">
        <div id="cardsContainer"><div class="empty">Loading profiles...</div></div>
        <div class="swipe-buttons">
            <button class="swipe-btn pass" id="passBtn">✗</button>
            <button class="swipe-btn like" id="likeBtn">♥</button>
        </div>
    </div>
    <div id="matchesPage" class="page"><div id="matchesList"><div class="empty">No matches yet</div></div></div>
    <div id="likesPage" class="page"><div id="likesList"><div class="empty">No likes yet</div></div></div>
    <div id="profilePage" class="page">
        <div class="profile-card">
            <div class="profile-avatar" id="profileAvatar"><span>👤</span></div>
            <h2 id="profileName"></h2>
            <p id="profileEmail"></p>
            <p id="profileAge"></p>
            <p id="profileBio"></p>
            <div id="profileInterests"></div>
            <p id="profileGoal"></p>
            <button id="editProfileBtn" style="background:#f0f0f0; color:#333;">✏️ Edit Profile</button>
            <div style="margin-top:20px; padding-top:20px; border-top:1px solid #ddd;">
                <button id="resetSwipesBtn" style="background:#f44336;">🔄 Reset All Swipes</button>
            </div>
        </div>
    </div>
    <div class="nav">
        <div class="nav-item" data-page="swipe">🔥<span>Swipe</span></div>
        <div class="nav-item" data-page="matches">💬<span>Matches</span><span id="unreadBadge" class="badge-count hidden"></span></div>
        <div class="nav-item" data-page="likes">💌<span>Likes</span><span id="likesBadge" class="badge-count hidden"></span></div>
        <div class="nav-item" data-page="profile">👤<span>Profile</span></div>
    </div>
</div>

<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
        authDomain: "teamup-68a21.firebaseapp.com",
        projectId: "teamup-68a21",
        storageBucket: "teamup-68a21.firebasestorage.app",
        messagingSenderId: "379106762572",
        appId: "1:379106762572:web:b80b61d82df788cc0339e9"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Global variables
    let currentUser = null;
    let currentProfile = null;
    let selectedInterests = [];
    let usersList = [];
    let currentSwipeIndex = 0;
    let incomingLikesUnsubscribe = null;

    // Helper functions
    function showToast(msg) {
        let t = document.createElement('div');
        t.className = 'toast';
        t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // SIGNUP (sends verification email, signs out immediately)
    document.getElementById('doSignup').onclick = async () => {
        const name = document.getElementById('signupName').value.trim();
        const age = parseInt(document.getElementById('signupAge').value);
        const email = document.getElementById('signupEmail').value.trim();
        const pwd = document.getElementById('signupPassword').value;
        const bio = document.getElementById('signupBio').value.trim();
        const goal = document.getElementById('signupGoal').value;

        if (!name || !age || !email || !pwd) return showToast('Fill all fields');
        if (selectedInterests.length === 0) return showToast('Select an interest');
        if (age < 18) return showToast('You must be 18+');
        if (pwd.length < 6) return showToast('Password min 6 characters');

        const btn = document.getElementById('doSignup');
        btn.disabled = true;
        btn.innerText = 'Creating...';

        try {
            const cred = await auth.createUserWithEmailAndPassword(email, pwd);
            const user = cred.user;

            // Send verification email (now routed through Brevo SMTP)
            await user.sendEmailVerification();

            // Save user data to Firestore
            await db.collection('users').doc(user.uid).set({
                uid: user.uid,
                name, age,
                bio: bio || '',
                interests: selectedInterests,
                photo_url: '',
                photos: [],
                likes: [],
                incomingLikes: [],
                matches: [],
                location: null,
                relationshipGoal: goal,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });

            // Sign out immediately – user must verify before logging in
            await auth.signOut();

            showToast('✅ Account created! Verification email sent. Check your inbox/spam.');
            // Clear form and switch to login tab
            document.getElementById('signupName').value = '';
            document.getElementById('signupAge').value = '';
            document.getElementById('signupEmail').value = '';
            document.getElementById('signupPassword').value = '';
            document.getElementById('signupBio').value = '';
            selectedInterests = [];
            document.querySelectorAll('#interestsGrid .interest-chip').forEach(c => c.classList.remove('selected'));
            document.getElementById('loginTab').click();
        } catch (err) {
            showToast('❌ ' + err.message);
        } finally {
            btn.disabled = false;
            btn.innerText = 'Create Account';
        }
    };

    // LOGIN – blocks unverified users
    document.getElementById('doLogin').onclick = async () => {
        const email = document.getElementById('loginEmail').value.trim();
        const pwd = document.getElementById('loginPassword').value;
        if (!email || !pwd) return showToast('Enter email and password');

        const btn = document.getElementById('doLogin');
        btn.disabled = true;
        btn.innerText = 'Logging...';

        try {
            const cred = await auth.signInWithEmailAndPassword(email, pwd);
            const user = cred.user;

            // 🔴 CRITICAL: Reject unverified users
            if (!user.emailVerified) {
                await auth.signOut();
                showToast('⚠️ Please verify your email before logging in. Check your spam folder or click "Resend Email".');
                btn.disabled = false;
                btn.innerText = 'Login';
                return;
            }

            const doc = await db.collection('users').doc(user.uid).get();
            if (!doc.exists) throw new Error('Profile not found');

            currentUser = user;
            currentProfile = doc.data();

            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            document.getElementById('verifyBanner').style.display = 'none';

            updateProfileUI();
            loadCards();
            loadMatches();
            updateLikesBadge();

            // Listen for incoming likes
            if (incomingLikesUnsubscribe) incomingLikesUnsubscribe();
            incomingLikesUnsubscribe = db.collection('users').doc(currentUser.uid)
                .onSnapshot(doc => {
                    if (doc.exists) {
                        currentProfile.incomingLikes = doc.data().incomingLikes || [];
                        if (document.getElementById('likesPage').classList.contains('active')) renderLikesPage();
                        updateLikesBadge();
                    }
                });

            showToast(`Welcome back, ${currentProfile.name}!`);
        } catch (err) {
            showToast('Login failed: ' + err.message);
        } finally {
            btn.disabled = false;
            btn.innerText = 'Login';
        }
    };

    // RESEND VERIFICATION EMAIL (from banner)
    document.getElementById('resendVerificationBtn').onclick = async () => {
        if (currentUser && !currentUser.emailVerified) {
            try {
                await currentUser.sendEmailVerification();
                showToast('✅ Verification email resent! Check your spam folder.');
            } catch (err) {
                showToast('❌ ' + err.message);
            }
        } else if (currentUser && currentUser.emailVerified) {
            document.getElementById('verifyBanner').style.display = 'none';
            showToast('Email already verified!');
        } else {
            showToast('Please log in first to resend verification.');
        }
    };

    // LOGOUT
    document.getElementById('logoutBtn').onclick = async () => {
        if (confirm('Are you sure you want to logout?')) {
            if (incomingLikesUnsubscribe) incomingLikesUnsubscribe();
            await auth.signOut();
            location.reload();
        }
    };

    // Simulate loading profiles (replace with real Firestore query later)
    async function loadCards() {
        try {
            const likes = currentProfile.likes || [];
            const matches = currentProfile.matches || [];
            const snap = await db.collection('users').where('uid', '!=', currentUser.uid).get();
            const users = [];
            for (const doc of snap.docs) {
                const d = doc.data();
                if (likes.includes(doc.id) || matches.includes(doc.id)) continue;
                users.push({ id: doc.id, ...d });
            }
            usersList = users;
            currentSwipeIndex = 0;
            displayCard();
        } catch (e) {
            document.getElementById('cardsContainer').innerHTML = '<div class="empty">Error loading profiles</div>';
        }
    }

    function displayCard() {
        if (currentSwipeIndex >= usersList.length) {
            document.getElementById('cardsContainer').innerHTML = '<div class="empty">No more profiles. Reset swipes in Profile</div>';
            return;
        }
        const u = usersList[currentSwipeIndex];
        document.getElementById('cardsContainer').innerHTML = `
            <div class="swipe-card">
                <div class="card-img">${u.photo_url ? `<img src="${u.photo_url}">` : '👤'}</div>
                <div class="card-info">
                    <div class="card-name">${escapeHtml(u.name)}</div>
                    <div>${u.age} years old</div>
                    <div>${(u.interests || []).map(i => `<span class="badge">${escapeHtml(i)}</span>`).join('')}</div>
                    <div>${u.bio ? escapeHtml(u.bio.substring(0,100)) : ''}</div>
                </div>
            </div>
        `;
    }

    async function sendLike(targetId, name) {
        if ((currentProfile.likes || []).includes(targetId)) return;
        await db.collection('users').doc(currentUser.uid).update({ likes: firebase.firestore.FieldValue.arrayUnion(targetId) });
        currentProfile.likes.push(targetId);
        await db.collection('users').doc(targetId).update({ incomingLikes: firebase.firestore.FieldValue.arrayUnion(currentUser.uid) });
        showToast(`Liked ${name}`);
    }

    document.getElementById('likeBtn').onclick = async () => {
        if (currentSwipeIndex >= usersList.length) return;
        const liked = usersList[currentSwipeIndex];
        await sendLike(liked.id, liked.name);
        currentSwipeIndex++;
        displayCard();
    };
    document.getElementById('passBtn').onclick = () => {
        if (currentSwipeIndex < usersList.length) {
            currentSwipeIndex++;
            displayCard();
        }
    };

    function navigateTo(page) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(page + 'Page').classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.querySelector(`.nav-item[data-page="${page}"]`).classList.add('active');
        if (page === 'likes') renderLikesPage();
    }
    document.querySelectorAll('.nav-item').forEach(item => {
        item.onclick = () => navigateTo(item.dataset.page);
    });

    async function loadMatches() {
        const matches = currentProfile.matches || [];
        if (!matches.length) { document.getElementById('matchesList').innerHTML = '<div class="empty">No matches yet</div>'; return; }
        let html = '';
        for (const mid of matches) {
            const ids = mid.split('_');
            const otherId = ids[0] === currentUser.uid ? ids[1] : ids[0];
            const otherDoc = await db.collection('users').doc(otherId).get();
            if (!otherDoc.exists) continue;
            const other = otherDoc.data();
            html += `<div class="match-card"><div class="match-avatar">${other.photo_url ? `<img src="${other.photo_url}">` : '👤'}</div><div><div class="match-name">${escapeHtml(other.name)}</div></div></div>`;
        }
        document.getElementById('matchesList').innerHTML = html;
    }

    async function renderLikesPage() {
        const incoming = currentProfile.incomingLikes || [];
        const container = document.getElementById('likesList');
        if (!incoming.length) { container.innerHTML = '<div class="empty">No likes yet</div>'; return; }
        container.innerHTML = '';
        for (const uid of incoming) {
            const doc = await db.collection('users').doc(uid).get();
            if (!doc.exists) continue;
            const u = doc.data();
            const div = document.createElement('div');
            div.className = 'match-card';
            div.innerHTML = `<div class="match-avatar">${u.photo_url ? `<img src="${u.photo_url}">` : '👤'}</div>
                            <div style="flex:1"><div class="match-name">${escapeHtml(u.name)}</div></div>
                            <div><button class="accept-btn" style="background:#4caf50; padding:6px 12px; border-radius:8px;">Accept</button>
                            <button class="reject-btn" style="background:#f44336; padding:6px 12px; border-radius:8px;">Reject</button></div>`;
            container.appendChild(div);
            div.querySelector('.accept-btn').onclick = () => acceptLike(uid);
            div.querySelector('.reject-btn').onclick = () => rejectLike(uid);
        }
    }

    async function acceptLike(uid) {
        await db.collection('users').doc(currentUser.uid).update({ incomingLikes: firebase.firestore.FieldValue.arrayRemove(uid) });
        currentProfile.incomingLikes = currentProfile.incomingLikes.filter(id => id !== uid);
        const mid = [currentUser.uid, uid].sort().join('_');
        const matchDoc = await db.collection('matches').doc(mid).get();
        if (!matchDoc.exists) {
            await db.collection('matches').doc(mid).set({ id: mid, user1: currentUser.uid, user2: uid, created_at: firebase.firestore.FieldValue.serverTimestamp() });
            await db.collection('users').doc(currentUser.uid).update({ matches: firebase.firestore.FieldValue.arrayUnion(mid) });
            await db.collection('users').doc(uid).update({ matches: firebase.firestore.FieldValue.arrayUnion(mid) });
            currentProfile.matches.push(mid);
            await loadMatches();
        }
        renderLikesPage();
        updateLikesBadge();
    }

    async function rejectLike(uid) {
        await db.collection('users').doc(currentUser.uid).update({ incomingLikes: firebase.firestore.FieldValue.arrayRemove(uid) });
        currentProfile.incomingLikes = currentProfile.incomingLikes.filter(id => id !== uid);
        renderLikesPage();
        updateLikesBadge();
    }

    function updateLikesBadge() {
        const cnt = (currentProfile.incomingLikes || []).length;
        const badge = document.getElementById('likesBadge');
        if (cnt > 0) { badge.innerText = cnt > 9 ? '9+' : cnt; badge.classList.remove('hidden'); }
        else badge.classList.add('hidden');
    }

    function updateProfileUI() {
        if (!currentProfile) return;
        document.getElementById('profileName').innerText = currentProfile.name;
        document.getElementById('profileEmail').innerText = currentUser.email;
        document.getElementById('profileAge').innerText = currentProfile.age + ' years old';
        document.getElementById('profileBio').innerText = currentProfile.bio || 'No bio';
        document.getElementById('profileGoal').innerText = currentProfile.relationshipGoal || 'None';
        document.getElementById('profileInterests').innerHTML = (currentProfile.interests || []).map(i => `<span class="badge">${escapeHtml(i)}</span>`).join('');
    }

    document.getElementById('editProfileBtn').onclick = () => showToast('Edit profile coming soon');
    document.getElementById('resetSwipesBtn').onclick = async () => {
        if (confirm('Reset all swipes?')) {
            await db.collection('users').doc(currentUser.uid).update({ likes: [], matches: [], incomingLikes: [] });
            currentProfile.likes = []; currentProfile.matches = []; currentProfile.incomingLikes = [];
            loadCards();
            showToast('Swipes reset');
        }
    };

    // Tab switching for auth screen
    document.getElementById('loginTab').onclick = () => {
        document.getElementById('loginTab').classList.add('active');
        document.getElementById('signupTab').classList.remove('active');
        document.getElementById('loginDiv').style.display = 'block';
        document.getElementById('signupDiv').style.display = 'none';
    };
    document.getElementById('signupTab').onclick = () => {
        document.getElementById('signupTab').classList.add('active');
        document.getElementById('loginTab').classList.remove('active');
        document.getElementById('loginDiv').style.display = 'none';
        document.getElementById('signupDiv').style.display = 'block';
    };
    document.querySelectorAll('.interest-chip').forEach(c => {
        c.onclick = () => {
            c.classList.toggle('selected');
            const v = c.dataset.int;
            if (selectedInterests.includes(v)) selectedInterests = selectedInterests.filter(i => i !== v);
            else selectedInterests.push(v);
        };
    });

    // Auto‑login state check (if user already verified)
    auth.onAuthStateChanged(async (user) => {
        if (user && !currentUser && user.emailVerified) {
            const doc = await db.collection('users').doc(user.uid).get();
            if (doc.exists) {
                currentUser = user;
                currentProfile = doc.data();
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                updateProfileUI();
                loadCards();
                loadMatches();
                updateLikesBadge();
                if (incomingLikesUnsubscribe) incomingLikesUnsubscribe();
                incomingLikesUnsubscribe = db.collection('users').doc(currentUser.uid)
                    .onSnapshot(doc => {
                        if (doc.exists) {
                            currentProfile.incomingLikes = doc.data().incomingLikes || [];
                            if (document.getElementById('likesPage').classList.contains('active')) renderLikesPage();
                            updateLikesBadge();
                        }
                    });
            }
        } else if (user && !user.emailVerified) {
            // User logged in but unverified – sign them out
            await auth.signOut();
            document.getElementById('authScreen').style.display = 'flex';
            document.getElementById('app').style.display = 'none';
            showToast('Please verify your email before logging in.');
        }
    });
</script>
</body>
</html>
