<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TeamUp — Dating App with Agora Calls</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <!-- Agora SDK (latest stable) -->
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.22.0.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #ff7e5e, #feb47b);
            min-height: 100vh;
        }
        /* Auth screens */
        .auth-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }
        .auth-card {
            background: white;
            border-radius: 40px;
            padding: 36px 24px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
        }
        h1 {
            font-size: 2.4rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .tabs {
            display: flex;
            gap: 12px;
            margin: 24px 0 20px;
        }
        .tab {
            flex: 1;
            padding: 12px;
            border-radius: 60px;
            background: #f1f3f5;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .tab.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 12px rgba(102,126,234,0.3);
        }
        input, textarea, select {
            width: 100%;
            padding: 14px 16px;
            margin: 8px 0;
            border: 1px solid #e2e8f0;
            border-radius: 60px;
            font-size: 15px;
            background: #fefefe;
        }
        textarea {
            border-radius: 24px;
            resize: vertical;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 60px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        button:active { transform: scale(0.97); }
        .hidden { display: none; }
        .error { background: #fff0f0; color: #d32f2f; padding: 10px; border-radius: 40px; margin-top: 12px; }
        .success { background: #e6f7ec; color: #2e7d32; padding: 10px; border-radius: 40px; margin-top: 12px; }
        /* Location overlay */
        .location-screen {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            z-index: 50;
            justify-content: center;
            align-items: center;
        }
        .location-screen.active { display: flex; }
        .location-card {
            background: white;
            border-radius: 48px;
            padding: 36px 24px;
            max-width: 340px;
            text-align: center;
            animation: fadeUp 0.4s ease;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Main app container */
        .app {
            display: none;
            max-width: 500px;
            margin: 0 auto;
            background: #f9fafb;
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.08);
        }
        .header {
            background: white;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .header h2 {
            background: linear-gradient(135deg, #667eea, #764ba2);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .logout-btn {
            width: auto;
            padding: 8px 18px;
            background: #f1f3f5;
            color: #4a5568;
            font-size: 13px;
            margin: 0;
        }
        /* Bottom navigation */
        .nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 500px;
            margin: 0 auto;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 10px 16px 20px;
            border-top: 1px solid #eef2f6;
            z-index: 12;
        }
        .nav-item {
            text-align: center;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 30px;
            transition: 0.2s;
            font-weight: 500;
        }
        .nav-item.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .page {
            display: none;
            padding: 20px 16px 90px;
        }
        .page.active { display: block; }
        /* Swipe card */
        .swipe-card {
            background: white;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .card-img {
            height: 380px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            color: white;
            overflow: hidden;
        }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }
        .card-info { padding: 20px; }
        .card-name { font-size: 26px; font-weight: bold; }
        .badge {

            background: #f3e8ff;
            color: #667eea;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;

        .swipe-buttons {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin: 8px 0 16px;
        }
        .swipe-btn {

            height: 70px;

            border: none;

        }
        .like { background: #4caf50; color: white; }
        .pass { background: #f44336; color: white; }
        /* Match card */
        .match-card {
            background: white;
            border-radius: 24px;
            padding: 14px;
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 12px;
            cursor: pointer;
            border: 1px solid #edf2f7;
        }
        .match-avatar {
            width: 60px;
            height: 60px;

            background: linear-gradient(135deg, #667eea, #764ba2);

            align-items: center;
            justify-content: center;
            font-size: 28px;
            overflow: hidden;
        }
        .match-avatar img { width: 100%; height: 100%; object-fit: cover; }
        /* Chat panel */
        #chatPage {
            display: none;
            position: fixed;
            inset: 0;
            max-width: 500px;
            margin: 0 auto;
            background: #f8fafc;
            z-index: 30;
            flex-direction: column;
        }
        #chatPage.active { display: flex; }
        .chat-header {
            background: white;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #e2e8f0;
        }
        .back-btn {
            background: transparent;
            font-size: 24px;
            border: none;
            margin-right: 12px;
            cursor: pointer;
        }
        .call-btn {
            width: auto;
            padding: 8px 16px;
            margin: 0 5px;
            border-radius: 30px;
            font-size: 13px;
        }
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .bubble {
            max-width: 75%;
            padding: 10px 16px;
            border-radius: 24px;
            word-wrap: break-word;
        }
        .bubble.sent {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-bottom-right-radius: 5px;
        }
        .bubble.received {
            background: white;
            border-bottom-left-radius: 5px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.08);
        }
        .message-time {
            font-size: 10px;
            margin-top: 4px;
            opacity: 0.7;
        }
        .input-area {
            display: flex;
            gap: 10px;
            padding: 12px;
            background: white;
            border-top: 1px solid #eef2f6;
            align-items: center;
        }
        .input-area input {
            flex: 1;
            margin: 0;
            padding: 12px;
            border-radius: 40px;
            background: #f1f5f9;
            border: none;
        }
        .input-area button {
            width: auto;
            padding: 12px 20px;
            margin: 0;
        }
        /* Call UI (Agora) */
        .call-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 2000;
            flex-direction: column;
        }
        .call-modal.active { display: flex; }
        .remote-video {
            flex: 1;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .remote-video video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .local-video {
            position: absolute;
            bottom: 90px;
            right: 16px;
            width: 100px;
            height: 133px;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid white;
            background: #222;
        }
        .local-video video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .call-controls {
            position: absolute;
            bottom: 25px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 20px;
            background: rgba(0,0,0,0.6);
            padding: 12px;
        }
        .call-control-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: #2d3748;
            color: white;
            font-size: 24px;
            border: none;
            cursor: pointer;
        }
        .call-control-btn.end-call { background: #e53e3e; }
        .call-status {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 8px;
            z-index: 10;
            font-size: 14px;
        }
        /* Incoming call popup */
        .incoming-call-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 1500;
            justify-content: center;
            align-items: center;
        }
        .incoming-call-modal.active { display: flex; }
        .incoming-call-card {
            background: white;
            border-radius: 40px;
            padding: 30px;
            text-align: center;
            max-width: 300px;
            width: 90%;
        }
        .incoming-call-card .avatar { font-size: 56px; margin-bottom: 12px; }
        .incoming-call-buttons { display: flex; gap: 12px; margin-top: 20px; }
        .answer-btn { background: #4caf50; }
        .decline-btn { background: #f44336; }
        .empty { text-align: center; padding: 48px 20px; color: #718096; }
        .profile-card {
            background: white;
            border-radius: 32px;
            padding: 24px;
            text-align: center;
        }
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 60px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            overflow: hidden;
        }
        .profile-img img { width: 100%; height: 100%; object-fit: cover; }
        .interest-chip {
            background: #f0f0f0;
            padding: 8px 14px;
            border-radius: 40px;
            cursor: pointer;
            display: inline-block;
            margin: 4px;
        }
        .interest-chip.selected {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .match-popup-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
        }
        .match-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border-radius: 32px;
            padding: 28px;
            text-align: center;
            z-index: 101;
            width: 280px;
        }
    </style>
</head>
<body>

<!-- Auth Panel -->
<div id="authScreen" class="auth-screen">
    <div class="auth-card">
        <h1>✨ TeamUp</h1>
        <p>find your perfect match</p>
        <div class="tabs">

            <div id="interestsGrid">

</div>

<!-- Location overlay -->
<div id="locationScreen" class="location-screen">

        <button id="enableLocationBtn" style="background:#2196f3;">📍 Enable Location</button>

<!-- Main Dating App -->
<div id="app" class="app">
    <div class="header">

    <!-- Swipe page -->

        <div class="swipe-buttons">

<script>
    // Firebase config (your existing project)
    const firebaseConfig = {
        apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
        authDomain: "teamup-68a21.firebaseapp.com",
        projectId: "teamup-68a21",
        storageBucket: "teamup-68a21.firebasestorage.app",
        messagingSenderId: "379106762572",
        appId: "1:379106762572:web:b80b61d82df788cc0339e9"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // ========== AGORA CONFIGURATION (your credentials) ==========
    const AGORA_APP_ID = '2ee3d74df01a4e5cacfb952e6e3e51ba';
    // Development: using null token for simplicity. For production add token server.
    
    // Cloudinary preset (photo upload)
    const CLOUDINARY_CLOUD_NAME = "dweyrxxr8";
    const CLOUDINARY_UPLOAD_PRESET = "ML_image";

    // Global state
    let currentUser = null;
    let currentProfile = null;
    let pendingUser = null, pendingUserData = null;
    let userLocation = null;
    let selectedInterests = [];
    let usersList = [], currentSwipeIndex = 0;
    let currentMatchId = null, currentOtherId = null;
    let messagesUnsubscribe = null;
    let typingTimeout = null;
    let currentFilters = { gender: 'all', minAge: 18, maxAge: 100, maxDistance: 50 };

    // Agora call globals
    let agoraClient = null;
    let localAudioTrack = null;
    let localVideoTrack = null;
    let isCallActive = false;
    let currentCallType = null; // 'audio' or 'video'
    let incomingCallListener = null;

    // Helper functions
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }
    function formatTime(date) { if (!date) return ''; const d = date.toDate ? date.toDate() : new Date(date); return d.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }); }
    function showMessage(el, msg, isErr) { el.innerHTML = `<div class="${isErr ? 'error' : 'success'}">${msg}</div>`; setTimeout(() => { if(el) el.innerHTML = ''; }, 4000); }
    function calculateDistance(lat1,lng1,lat2,lng2) { const R=6371; const dLat=(lat2-lat1)*Math.PI/180; const dLon=(lng2-lng1)*Math.PI/180; const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2; return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)); }

    // ========== AGORA CALL INTEGRATION ==========
    async function initAgora() {
        if (agoraClient) return;
        agoraClient = AgoraRTC.createClient({ mode: 'rtc', codec: 'vp8' });
        agoraClient.on("user-published", async (user, mediaType) => {
            await agoraClient.subscribe(user, mediaType);
            if (mediaType === "video") {
                const remoteVideo = document.getElementById('remoteVideo');
                if (remoteVideo) user.videoTrack.play("remoteVideo");
            }
            if (mediaType === "audio") user.audioTrack.play();
            const statusDiv = document.getElementById('callStatusText');
            if (statusDiv) statusDiv.innerText = 'Connected';
        });
        agoraClient.on("user-left", () => endCall());
    }

    async function startCall(type) {
        if (!currentOtherId) { alert("Select a match first"); return; }
        try {
            if (!agoraClient) await initAgora();
            currentCallType = type;
            const channelName = `call_${currentMatchId}`;
            // For development we use null token (works because Agora allows null for testing with App ID)
            await agoraClient.join(AGORA_APP_ID, channelName, null, currentUser.uid);
            if (type === 'video') localVideoTrack = await AgoraRTC.createCameraVideoTrack();
            localAudioTrack = await AgoraRTC.createMicrophoneAudioTrack();
            const tracks = [localAudioTrack];
            if (localVideoTrack) tracks.push(localVideoTrack);
            await agoraClient.publish(tracks);
            setupCallUI(type);
            if (localVideoTrack) localVideoTrack.play("localVideo");
            isCallActive = true;
            // Store call info for incoming popup
            await db.collection('matches').doc(currentMatchId).collection('calls').add({
                callerId: currentUser.uid, callerName: currentProfile.name, receiverId: currentOtherId,
                type: type, channel: channelName, status: 'ringing',
                startedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            setTimeout(() => { if (isCallActive) { endCall(); alert("Call not answered"); } }, 30000);
        } catch (err) { console.error(err); alert("Call failed: "+err.message); endCall(); }
    }

    function setupCallUI(type) {
        let modal = document.getElementById('callModal');
        if (!modal) {
            modal = document.createElement('div'); modal.id = 'callModal'; modal.className = 'call-modal';
            modal.innerHTML = `<div class="call-container"><div class="call-status" id="callStatusText">Ringing...</div><div class="remote-video"><video id="remoteVideo" autoplay playsinline></video></div><div class="local-video"><video id="localVideo" autoplay playsinline muted></video></div><div class="call-controls"><button class="call-control-btn" id="muteCallBtn">🎤</button><button class="call-control-btn end-call" id="hangupBtn">📞</button></div></div>`;
            document.body.appendChild(modal);
        }
        if (type !== 'video') document.querySelector('#callModal .remote-video').innerHTML = '<div style="color:white; text-align:center; padding-top:50%;">🎙️ Voice Call</div>';
        modal.classList.add('active');
        document.getElementById('hangupBtn').onclick = () => endCall();
        document.getElementById('muteCallBtn').onclick = () => { if(localAudioTrack) localAudioTrack.setEnabled(!localAudioTrack.enabled); };
    }

    async function endCall() {
        if (localAudioTrack) { localAudioTrack.close(); localAudioTrack = null; }
        if (localVideoTrack) { localVideoTrack.close(); localVideoTrack = null; }
        if (agoraClient) await agoraClient.leave();
        const modal = document.getElementById('callModal'); if(modal) modal.classList.remove('active');
        isCallActive = false;
    }

    async function answerCall(callData, matchId) {
        try {
            if (!agoraClient) await initAgora();
            currentMatchId = matchId; currentOtherId = callData.callerId; currentCallType = callData.type;
            await agoraClient.join(AGORA_APP_ID, callData.channel, null, currentUser.uid);
            if (callData.type === 'video') localVideoTrack = await AgoraRTC.createCameraVideoTrack();
            localAudioTrack = await AgoraRTC.createMicrophoneAudioTrack();
            const tracks = [localAudioTrack]; if(localVideoTrack) tracks.push(localVideoTrack);
            await agoraClient.publish(tracks);
            setupCallUI(callData.type);
            if(localVideoTrack) localVideoTrack.play("localVideo");
            isCallActive = true;
            const q = await db.collection('matches').doc(matchId).collection('calls').where('channel','==',callData.channel).get();
            q.forEach(d => d.ref.update({ status: 'answered' }));
        } catch(e) { console.error(e); endCall(); }
    }

    function listenForIncomingCalls() {
        if(incomingCallListener) incomingCallListener();
        incomingCallListener = db.collectionGroup('calls')
            .where('receiverId', '==', currentUser?.uid)
            .where('status', '==', 'ringing')
            .onSnapshot(async (snap) => {
                for(const doc of snap.docs) {
                    const data = doc.data();
                    if(data.receiverId === currentUser?.uid && !isCallActive) {
                        const callerDoc = await db.collection('users').doc(data.callerId).get();
                        const name = callerDoc.data()?.name || 'Someone';
                        const modalDiv = document.createElement('div'); modalDiv.className = 'incoming-call-modal';
                        modalDiv.innerHTML = `<div class="incoming-call-card"><div class="avatar">📞</div><h3>${escapeHtml(name)} is calling...</h3><p>${data.type === 'video' ? '📹 Video' : '🎙️ Voice'}</p><div class="incoming-call-buttons"><button class="answer-btn">Answer</button><button class="decline-btn">Decline</button></div></div>`;
                        document.body.appendChild(modalDiv); modalDiv.classList.add('active');
                        modalDiv.querySelector('.answer-btn').onclick = async () => { modalDiv.remove(); await answerCall(data, doc.ref.parent.parent?.id); };
                        modalDiv.querySelector('.decline-btn').onclick = async () => { modalDiv.remove(); await doc.ref.update({ status: 'declined' }); };
                    }
                }
            });
    }

    // ========== PROFILE PHOTO UPLOAD (Cloudinary) ==========
    async function compressImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader(); reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image(); img.src = e.target.result;
                img.onload = () => {
                    let w = img.width, h = img.height, max = 800;
                    if(w>max) { h=(h*max)/w; w=max; }
                    const canvas = document.createElement('canvas'); canvas.width=w; canvas.height=h;
                    canvas.getContext('2d').drawImage(img,0,0,w,h);
                    canvas.toBlob(resolve, 'image/jpeg',0.7);
                };
            };
        });
    }
    document.getElementById('uploadPhotoBtn').onclick = () => document.getElementById('photoUpload').click();
    document.getElementById('photoUpload').onchange = async (e) => {
        const file = e.target.files[0]; if(!file) return;
        const btn = document.getElementById('uploadPhotoBtn'); btn.disabled=true; btn.innerText='Uploading...';
        try {
            let blob = file; if(file.size>500*1024) blob = await compressImage(file);
            const fd = new FormData(); fd.append('file',blob); fd.append('upload_preset',CLOUDINARY_UPLOAD_PRESET);
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`,{method:'POST',body:fd});
            const data = await res.json(); if(data.error) throw new Error(data.error.message);
            await db.collection('users').doc(currentUser.uid).update({photo_url: data.secure_url});
            currentProfile.photo_url = data.secure_url;
            document.getElementById('profileImg').innerHTML = `<img src="${data.secure_url}">`;
            alert('✅ Photo updated'); loadCards();
        } catch(err) { alert('Upload failed'); } finally { btn.disabled=false; btn.innerText='📸 Upload Photo'; }
    };

    // ========== CORE DATING LOGIC ==========
    async function loadCards() {
        const likes = currentProfile.likes||[], matches = currentProfile.matches||[];
        const snap = await db.collection('users').where('uid','!=',currentUser.uid).get();
        let users = [];
        for(const doc of snap.docs) {
            const data = doc.data();
            if(likes.includes(doc.id) || matches.includes(doc.id)) continue;
            if(currentFilters.gender !== 'all' && data.gender !== currentFilters.gender) continue;
            if(data.age < currentFilters.minAge || data.age > currentFilters.maxAge) continue;
            let dist = null;
            if(userLocation && data.location && currentFilters.maxDistance<999) {
                dist = calculateDistance(userLocation.lat, userLocation.lng, data.location.lat, data.location.lng);
                if(dist > currentFilters.maxDistance) continue;
            }
            users.push({id:doc.id, ...data, distance:dist});
        }
        users.sort((a,b)=>(a.distance??999)-(b.distance??999));
        usersList = users; currentSwipeIndex = 0; showCard();
    }
    function showCard() {
        if(currentSwipeIndex >= usersList.length) { document.getElementById('cards').innerHTML = '<div class="empty">No more profiles — reset swipes in profile</div>'; return; }
        const u = usersList[currentSwipeIndex];
        document.getElementById('cards').innerHTML = `<div class="swipe-card"><div class="card-img">${u.photo_url?`<img src="${u.photo_url}">`:'👤'}</div><div class="card-info"><div class="card-name">${escapeHtml(u.name)}</div><div>${u.age} yo</div><div>${(u.interests||[]).map(i=>`<span class="badge">${escapeHtml(i)}</span>`).join('')}</div>${u.bio?`<div style="margin-top:8px;">${escapeHtml(u.bio.substring(0,100))}</div>`:''}</div></div>`;
    }
    document.getElementById('likeBtn').onclick = async () => {
        if(currentSwipeIndex >= usersList.length) return;
        const liked = usersList[currentSwipeIndex];
        const newLikes = [...(currentProfile.likes||[]), liked.id];
        await db.collection('users').doc(currentUser.uid).update({likes: newLikes});
        currentProfile.likes = newLikes;
        const theirDoc = await db.collection('users').doc(liked.id).get();
        if((theirDoc.data().likes||[]).includes(currentUser.uid)) {
            const matchId = [currentUser.uid, liked.id].sort().join('_');
            if(!(await db.collection('matches').doc(matchId).get()).exists) {
                await db.collection('matches').doc(matchId).set({id:matchId, user1:currentUser.uid, user2:liked.id, created_at:firebase.firestore.FieldValue.serverTimestamp()});
                await db.collection('users').doc(currentUser.uid).update({matches: firebase.firestore.FieldValue.arrayUnion(matchId)});
                await db.collection('users').doc(liked.id).update({matches: firebase.firestore.FieldValue.arrayUnion(matchId)});
                currentProfile.matches = [...(currentProfile.matches||[]), matchId];
                alert(`🎉 It's a match with ${liked.name}!`); loadMatches();
            }
        }
        currentSwipeIndex++; showCard();
    };
    document.getElementById('passBtn').onclick = () => { if(currentSwipeIndex<usersList.length) { currentSwipeIndex++; showCard(); } };
    async function loadMatches() {
        const matchIds = currentProfile.matches||[];
        if(!matchIds.length) { document.getElementById('matchesList').innerHTML='<div class="empty">No matches yet</div>'; return; }
        let html='';
        for(const mid of matchIds) {
            const otherId = mid.split('_').find(id=>id!==currentUser.uid);
            const doc = await db.collection('users').doc(otherId).get();
            if(!doc.exists) continue;
            const o = doc.data();
            html += `<div class="match-card" data-match="${mid}" data-other="${otherId}"><div class="match-avatar">${o.photo_url?`<img src="${o.photo_url}">`:'👤'}</div><div><strong>${escapeHtml(o.name)}</strong><div class="match-preview">💬 tap to chat</div></div></div>`;
        }
        document.getElementById('matchesList').innerHTML = html;
        document.querySelectorAll('.match-card').forEach(c => c.onclick = () => openChat(c.dataset.match, c.dataset.other));
    }
    async function openChat(matchId, otherId) {
        if(messagesUnsubscribe) messagesUnsubscribe();
        currentMatchId=matchId; currentOtherId=otherId;
        const other = (await db.collection('users').doc(otherId).get()).data();
        document.getElementById('chatPartnerName').innerText = other.name;
        document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
        document.getElementById('chatPage').classList.add('active');
        const msgRef = db.collection('matches').doc(matchId).collection('messages');
        messagesUnsubscribe = msgRef.orderBy('createdAt','asc').onSnapshot(snap=>{
            const container = document.getElementById('messagesContainer'); container.innerHTML='';
            if(snap.empty) { container.innerHTML='<div class="empty">💬 Say hello!</div>'; return; }
            snap.forEach(d=>addMessage(d.data()));
            setTimeout(()=>{const c=document.getElementById('messagesContainer'); if(c)c.scrollTop=c.scrollHeight;},50);
        });
    }
    function addMessage(msg) {
        const isSent = msg.senderId === currentUser.uid;
        const wrapper = document.createElement('div'); wrapper.style.display='flex'; wrapper.style.justifyContent = isSent?'flex-end':'flex-start';
        wrapper.innerHTML = `<div class="bubble ${isSent?'sent':'received'}">${escapeHtml(msg.text)}<div class="message-time">${formatTime(msg.createdAt)}</div></div>`;
        document.getElementById('messagesContainer').appendChild(wrapper);
    }
    document.getElementById('sendMessageBtn').onclick = async () => {
        const text = document.getElementById('chatInput').value.trim();
        if(!text || !currentMatchId) return;
        await db.collection('matches').doc(currentMatchId).collection('messages').add({type:'text',text,senderId:currentUser.uid,receiverId:currentOtherId,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
        document.getElementById('chatInput').value = '';
    };
    document.getElementById('chatBackBtn').onclick = () => {
        if(messagesUnsubscribe) messagesUnsubscribe();
        document.getElementById('chatPage').classList.remove('active');
        document.getElementById('matchesPage').classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
        document.querySelector('.nav-item[data-page="matches"]').classList.add('active');
        loadMatches();
    };
    document.getElementById('editProfileBtn').onclick = async () => {
        const newName = prompt('New name', currentProfile.name);
        if(newName?.trim()) await db.collection('users').doc(currentUser.uid).update({name:newName.trim()});
        currentProfile.name = newName?.trim() || currentProfile.name;
        updateProfileUI();
    };
    document.getElementById('resetSwipesBtn').onclick = async () => {
        if(confirm('⚠️ Reset all swipes and matches?')) {
            await db.collection('users').doc(currentUser.uid).update({likes:[], matches:[]});
            currentProfile.likes = []; currentProfile.matches = [];
            loadCards(); loadMatches();
            alert('Reset done');
        }
    };
    function updateProfileUI() {
        document.getElementById('profileName').innerText = currentProfile.name;
        document.getElementById('profileAge').innerText = currentProfile.age+' years old';
        document.getElementById('profileBio').innerText = currentProfile.bio || 'No bio';
        document.getElementById('profileInterests').innerHTML = (currentProfile.interests||[]).map(i=>`<span class="badge">${escapeHtml(i)}</span>`).join('');
        const imgDiv = document.getElementById('profileImg');
        if(currentProfile.photo_url) imgDiv.innerHTML = `<img src="${currentProfile.photo_url}">`;
        else imgDiv.innerHTML = '👤';
    }

    // ========== AUTH & LOCATION ==========
    function showLocationPage(user, data) { pendingUser=user; pendingUserData=data; document.getElementById('locationScreen').classList.add('active'); }
    async function saveLocationAndProceed(loc) {
        if(pendingUser && pendingUserData) await db.collection('users').doc(pendingUser.uid).update({location:loc,locationEnabled:!!loc});
        document.getElementById('locationScreen').classList.remove('active');
        document.getElementById('authScreen').style.display='none';
        document.getElementById('app').style.display='block';
        currentUser = pendingUser; currentProfile = pendingUserData; userLocation = loc;
        updateProfileUI(); loadCards(); loadMatches(); listenForIncomingCalls(); initAgora();
    }
    document.getElementById('enableLocationBtn').onclick = () => {
        navigator.geolocation.getCurrentPosition(async(pos)=>{
            const loc = {lat:pos.coords.latitude, lng:pos.coords.longitude};
            await saveLocationAndProceed(loc);
        }, ()=>saveLocationAndProceed(null));
    };
    document.getElementById('skipLocationBtn').onclick = ()=>saveLocationAndProceed(null);

    // Interest selection
    document.querySelectorAll('#interestsGrid .interest-chip').forEach(c => {
        c.onclick = () => {
            c.classList.toggle('selected');
            const val = c.dataset.int;
            if(selectedInterests.includes(val)) selectedInterests = selectedInterests.filter(i=>i!==val);
            else selectedInterests.push(val);
        };
    });
    document.getElementById('loginTab').onclick = () => { document.getElementById('loginTab').classList.add('active'); document.getElementById('signupTab').classList.remove('active'); document.getElementById('loginDiv').classList.remove('hidden'); document.getElementById('signupDiv').classList.add('hidden'); };
    document.getElementById('signupTab').onclick = () => { document.getElementById('signupTab').classList.add('active'); document.getElementById('loginTab').classList.remove('active'); document.getElementById('signupDiv').classList.remove('hidden'); document.getElementById('loginDiv').classList.add('hidden'); };
    document.getElementById('doSignup').onclick = async () => {
        const name=document.getElementById('signupName').value.trim(), age=parseInt(document.getElementById('signupAge').value), email=document.getElementById('signupEmail').value.trim(), pwd=document.getElementById('signupPassword').value, bio=document.getElementById('signupBio').value;
        if(!name||!age||!email||!pwd) return showMessage(document.getElementById('signupMsg'),'Fill all fields',true);
        if(selectedInterests.length===0) return showMessage(document.getElementById('signupMsg'),'Pick interest',true);
        if(age<18) return showMessage(document.getElementById('signupMsg'),'18+ only',true);
        const cred = await auth.createUserWithEmailAndPassword(email,pwd);
        await db.collection('users').doc(cred.user.uid).set({uid:cred.user.uid,name,age,bio,interests:selectedInterests,photo_url:'',likes:[],matches:[],createdAt:firebase.firestore.FieldValue.serverTimestamp()});
        showMessage(document.getElementById('signupMsg'),'✅ Account created! Please login.',false);
        document.getElementById('loginTab').click();
    };
    document.getElementById('doLogin').onclick = async () => {
        const email=document.getElementById('loginEmail').value.trim(), pwd=document.getElementById('loginPassword').value;
        const cred = await auth.signInWithEmailAndPassword(email,pwd);
        currentUser=cred.user;
        const doc = await db.collection('users').doc(currentUser.uid).get();
        currentProfile=doc.data(); userLocation=currentProfile.location||null;
        document.getElementById('authScreen').style.display='none';
        document.getElementById('app').style.display='block';
        updateProfileUI(); loadCards(); loadMatches(); listenForIncomingCalls(); initAgora();
    };
    document.getElementById('logoutBtn').onclick = async () => { if(messagesUnsubscribe) messagesUnsubscribe(); if(incomingCallListener) incomingCallListener(); if(agoraClient) await agoraClient.leave(); auth.signOut().then(()=>location.reload()); };
    document.querySelectorAll('.nav-item').forEach(item=>{
        item.onclick = () => {
            const pg = item.dataset.page;
            document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active')); item.classList.add('active');
            document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
            document.getElementById(pg+'Page').classList.add('active');
            if(pg==='swipe') loadCards(); if(pg==='matches') loadMatches();
        };
    });
    document.getElementById('voiceCallBtn').onclick = () => startCall('audio');
    document.getElementById('videoCallBtn').onclick = () => startCall('video');
    auth.onAuthStateChanged(async(user) => {
        if(user && !currentUser) {
            const doc = await db.collection('users').doc(user.uid).get();
            if(doc.exists) {
                currentUser=user; currentProfile=doc.data(); userLocation=currentProfile.location||null;
                document.getElementById('authScreen').style.display='none';
                document.getElementById('app').style.display='block';
                updateProfileUI(); loadCards(); loadMatches(); listenForIncomingCalls(); initAgora();
            }
        }
    });
</script>
</body>
</html>
