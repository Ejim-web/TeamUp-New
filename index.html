<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TeamUp - Dating App</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/compressorjs@1.2.1/dist/compressor.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; background: linear-gradient(135deg, #ff6b6b, #ee5a24); min-height: 100vh; }
        
        .auth-screen { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; background: linear-gradient(135deg, #ff6b6b, #ee5a24); }
        .auth-card { background: white; border-radius: 24px; padding: 40px 30px; max-width: 400px; width: 100%; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        h1 { color: #ee5a24; margin-bottom: 10px; }
        .tabs { display: flex; gap: 12px; margin-bottom: 30px; }
        .tab { flex: 1; padding: 12px; cursor: pointer; border-radius: 12px; background: #f0f0f0; font-weight: bold; }
        .tab.active { background: #ee5a24; color: white; }
        input, textarea, select { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ddd; border-radius: 12px; font-size: 16px; }
        button { width: 100%; padding: 14px; background: #ee5a24; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: opacity 0.2s; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        button:active { transform: scale(0.98); }
        .hidden { display: none; }
        .error { background: #ffe6e6; color: red; padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 14px; }
        .success { background: #e6ffe6; color: green; padding: 10px; border-radius: 8px; margin-top: 10px; }
        
        .app { display: none; max-width: 500px; margin: 0 auto; background: #f5f5f5; min-height: 100vh; position: relative; }
        .header { background: white; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 10; }
        .header h2 { color: #ee5a24; }
        .logout-btn { width: auto; padding: 8px 16px; background: #f0f0f0; color: #666; margin-top: 0; }
        
        .nav { position: fixed; bottom: 0; left: 0; right: 0; max-width: 500px; margin: 0 auto; background: white; display: flex; justify-content: space-around; padding: 12px; border-top: 1px solid #ddd; z-index: 10; }
        .nav-item { text-align: center; cursor: pointer; padding: 8px; border-radius: 12px; transition: background 0.2s; }
        .nav-item.active { color: #ee5a24; background: rgba(238,90,36,0.1); }
        .nav-item span { font-size: 11px; display: block; }
        
        .page { display: none; padding: 20px; padding-bottom: 80px; }
        .page.active { display: block; }
        
        .swipe-card { background: white; border-radius: 24px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: transform 0.2s; }
        .swipe-card:active { transform: scale(0.98); }
        .card-img { height: 400px; background: linear-gradient(135deg, #ff6b6b, #ee5a24); display: flex; align-items: center; justify-content: center; font-size: 80px; color: white; overflow: hidden; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }
        .card-info { padding: 20px; }
        .card-name { font-size: 28px; font-weight: bold; }
        .badge { display: inline-block; padding: 6px 14px; background: #f0f0f0; border-radius: 20px; font-size: 12px; margin: 3px; color: #ee5a24; font-weight: bold; }
        .swipe-buttons { display: flex; justify-content: center; gap: 30px; margin-top: 20px; }
        .swipe-btn { width: 70px; height: 70px; border-radius: 50%; font-size: 32px; border: none; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.15); transition: transform 0.1s; }
        .swipe-btn:active { transform: scale(0.95); }
        .like { background: #4caf50; color: white; }
        .pass { background: #f44336; color: white; }
        
        .match-card { background: white; border-radius: 16px; padding: 15px; display: flex; align-items: center; gap: 15px; margin-bottom: 12px; cursor: pointer; border: 1px solid #ddd; transition: all 0.2s; }
        .match-card:active { transform: scale(0.98); }
        .match-avatar { width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, #ff6b6b, #ee5a24); display: flex; align-items: center; justify-content: center; font-size: 24px; color: white; overflow: hidden; position: relative; }
        .match-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .online-dot { position: absolute; bottom: 2px; right: 2px; width: 12px; height: 12px; background: #4caf50; border-radius: 50%; border: 2px solid white; }
        .match-name { font-weight: bold; font-size: 18px; }
        .match-preview { font-size: 12px; color: #999; margin-top: 4px; }
        .match-time { font-size: 10px; color: #ccc; margin-left: auto; }
        
        .profile-card { background: white; border-radius: 24px; padding: 30px; text-align: center; }
        .profile-img { width: 140px; height: 140px; border-radius: 70px; object-fit: cover; margin: 0 auto 20px; border: 4px solid #ee5a24; cursor: pointer; }
        .reset-btn { background: #f44336; color: white; margin-top: 20px; }
        .danger-zone { border-top: 1px solid #ddd; margin-top: 20px; padding-top: 20px; }
        .danger-text { color: #f44336; font-size: 12px; margin-bottom: 10px; }
        
        /* Filters */
        .filters-panel { background: white; border-radius: 16px; padding: 15px; margin-bottom: 20px; display: none; }
        .filters-panel.show { display: block; }
        .filter-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .filter-row select, .filter-row input { margin: 0; }
        .filter-toggle { background: #f0f0f0; border: none; padding: 8px; border-radius: 20px; margin-bottom: 10px; width: auto; }
        
        /* Chat Page */
        #chatPage {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            max-width: 500px;
            margin: 0 auto;
            background: #f5f5f5;
            z-index: 20;
            flex-direction: column;
        }
        #chatPage.active { display: flex; }
        .chat-header { background: white; padding: 15px; display: flex; align-items: center; border-bottom: 1px solid #ddd; }
        .back-btn { background: #f0f0f0; border: none; padding: 8px 16px; border-radius: 8px; margin-right: 15px; cursor: pointer; }
        .chat-header-info { flex: 1; }
        .chat-header-name { font-weight: bold; }
        .chat-header-status { font-size: 11px; color: #999; }
        .chat-header-status.online { color: #4caf50; }
        .chat-header-status.typing { color: #ee5a24; }
        .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .bubble { max-width: 80%; padding: 10px 16px; border-radius: 20px; word-wrap: break-word; }
        .sent { background: #ee5a24; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .received { background: white; color: black; align-self: flex-start; border-bottom-left-radius: 4px; }
        .message-time { font-size: 10px; opacity: 0.7; margin-top: 4px; }
        .input-area { display: flex; gap: 10px; padding: 15px; background: white; border-top: 1px solid #ddd; }
        .input-area input { flex: 1; margin: 0; padding: 12px; }
        .input-area button { width: auto; padding: 12px 24px; margin: 0; }
        .empty { text-align: center; color: #999; padding: 60px 20px; }
        .typing-indicator { font-size: 11px; color: #ee5a24; padding: 5px 20px; font-style: italic; }
        .loading-spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #fff; border-radius: 50%; border-top-color: transparent; animation: spin 0.6s linear infinite; margin-right: 8px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .interests-grid { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
        .interest-chip { padding: 8px 16px; background: #f0f0f0; border-radius: 20px; cursor: pointer; font-size: 14px; transition: all 0.2s; }
        .interest-chip.selected { background: #ee5a24; color: white; }
        .match-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; border-radius: 24px; padding: 30px; text-align: center; z-index: 1000; box-shadow: 0 10px 40px rgba(0,0,0,0.3); max-width: 300px; width: 90%; animation: bounce 0.5s ease; }
        .match-popup-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 999; }
        @keyframes bounce { 0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } 80% { transform: translate(-50%, -50%) scale(1.05); } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
        .match-popup h3 { color: #ee5a24; margin: 15px 0; }
        .match-popup button { width: auto; padding: 10px 25px; margin-top: 15px; }
        
        .load-more-btn { background: #f0f0f0; color: #666; margin-top: 10px; }
        .infinite-scroll-trigger { height: 20px; text-align: center; margin: 10px 0; }
        .gender-select { display: flex; gap: 10px; margin: 10px 0; }
        .gender-option { flex: 1; padding: 10px; background: #f0f0f0; border-radius: 12px; cursor: pointer; text-align: center; }
        .gender-option.selected { background: #ee5a24; color: white; }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .loading-spinner-large {
            width: 50px;
            height: 50px;
            border: 4px solid #fff;
            border-radius: 50%;
            border-top-color: #ee5a24;
            animation: spin 0.8s linear infinite;
        }
    </style>
</head>
<body>

<div id="authScreen" class="auth-screen">
    <div class="auth-card">
        <h1>❤️ TeamUp</h1>
        <p>Find your perfect match</p>
        <div class="tabs">
            <div class="tab active" id="loginTab">Login</div>
            <div class="tab" id="signupTab">Sign Up</div>
        </div>
        <div id="loginDiv">
            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginPassword" placeholder="Password">
            <button id="doLogin">Login</button>
            <div id="loginMsg"></div>
        </div>
        <div id="signupDiv" class="hidden">
            <input type="text" id="signupName" placeholder="Full Name">
            <input type="number" id="signupAge" placeholder="Age">
            <div class="gender-select" id="signupGender">
                <div class="gender-option" data-gender="male">♂ Male</div>
                <div class="gender-option" data-gender="female">♀ Female</div>
                <div class="gender-option" data-gender="other">⚧ Other</div>
            </div>
            <select id="signupPreference">
                <option value="all">Interested in: Everyone</option>
                <option value="male">Interested in: Men</option>
                <option value="female">Interested in: Women</option>
                <option value="other">Interested in: Other</option>
            </select>
            <input type="email" id="signupEmail" placeholder="Email">
            <input type="password" id="signupPassword" placeholder="Password">
            <textarea id="signupBio" placeholder="Bio (optional)" rows="3"></textarea>
            <div class="interests-grid" id="interestsGrid">
                <span class="interest-chip" data-int="dating">❤️ Dating</span>
                <span class="interest-chip" data-int="friendship">👥 Friendship</span>
                <span class="interest-chip" data-int="gaming">🎮 Gaming</span>
                <span class="interest-chip" data-int="study">📚 Study</span>
                <span class="interest-chip" data-int="business">💼 Business</span>
            </div>
            <button id="doSignup">Create Account</button>
            <div id="signupMsg"></div>
        </div>
    </div>
</div>

<div id="app" class="app">
    <div class="header">
        <h2>TeamUp</h2>
        <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>
    
    <div id="swipePage" class="page active">
        <button class="filter-toggle" id="filterToggleBtn">🔍 Show Filters</button>
        <div id="filtersPanel" class="filters-panel">
            <div class="filter-row">
                <select id="filterGender">
                    <option value="all">All Genders</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div class="filter-row">
                <input type="number" id="filterMinAge" placeholder="Min Age" value="18">
                <input type="number" id="filterMaxAge" placeholder="Max Age" value="100">
            </div>
            <button id="applyFiltersBtn">Apply Filters</button>
        </div>
        <div id="cards"><div class="empty">Loading profiles...</div></div>
        <div id="loadMoreTrigger" class="infinite-scroll-trigger hidden"></div>
        <div class="swipe-buttons">
            <button class="swipe-btn pass" id="passBtn">✗</button>
            <button class="swipe-btn like" id="likeBtn">♥</button>
        </div>
    </div>
    
    <div id="matchesPage" class="page">
        <div id="matchesList"><div class="empty">No matches yet</div></div>
    </div>
    
    <div id="profilePage" class="page">
        <div class="profile-card">
            <img id="profileImg" class="profile-img" src="https://placehold.co/400x400?text=👤">
            <h2 id="profileName"></h2>
            <p id="profileEmail"></p>
            <p id="profileAge"></p>
            <p id="profileBio"></p>
            <div id="profileInterests"></div>
            <p id="profilePreference"></p>
            <input type="file" id="photoUpload" accept="image/*" style="display:none">
            <button id="uploadPhotoBtn">📸 Upload Photo</button>
            <button id="editProfileBtn" style="margin-top:10px; background:#f0f0f0; color:#333;">✏️ Edit Profile</button>
            <div class="danger-zone">
                <div class="danger-text">⚠️ Danger Zone</div>
                <button id="resetSwipesBtn" class="reset-btn">🔄 Reset All Swipes & Matches</button>
                <button id="blockedUsersBtn" class="reset-btn" style="background:#666; margin-top:10px;">🚫 Blocked Users</button>
                <button id="reportUserBtn" class="reset-btn" style="background:#ff9800;">⚠️ Report User</button>
            </div>
        </div>
    </div>
    
    <div id="chatPage">
        <div class="chat-header">
            <button class="back-btn" id="chatBackBtn">← Back</button>
            <div class="chat-header-info">
                <div class="chat-header-name" id="chatPartnerName">Chat</div>
                <div class="chat-header-status" id="chatPartnerStatus">Offline</div>
            </div>
            <button id="blockInChatBtn" style="background:#f44336; width:auto; padding:5px 10px; margin:0;">🚫 Block</button>
        </div>
        <div class="chat-area">
            <div id="chatMessages" class="messages"></div>
            <div id="typingIndicator" class="typing-indicator hidden"></div>
            <div class="input-area">
                <input type="text" id="chatInput" placeholder="Type a message...">
                <button id="sendMessageBtn">Send</button>
            </div>
        </div>
    </div>
    
    <div class="nav">
        <div class="nav-item active" data-page="swipe">🔥<span>Swipe</span></div>
        <div class="nav-item" data-page="matches">💬<span>Matches</span></div>
        <div class="nav-item" data-page="profile">👤<span>Profile</span></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
        authDomain: "teamup-68a21.firebaseapp.com",
        projectId: "teamup-68a21",
        storageBucket: "teamup-68a21.firebasestorage.app",
        messagingSenderId: "379106762572",
        appId: "1:379106762572:web:b80b61d82df788cc0339e9"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

    const CLOUDINARY_CLOUD_NAME = "dweyrxxr8";
    const CLOUDINARY_UPLOAD_PRESET = "teamup_unsigned";

    let currentUser = null;
    let currentProfile = null;
    let selectedInterests = [];
    let selectedGender = 'male';
    let usersList = [];
    let currentSwipeIndex = 0;
    let currentMatchId = null;
    let currentOtherId = null;
    let chatUnsubscribe = null;
    let presenceUnsubscribe = null;
    let typingTimeout = null;
    let lastDoc = null;
    let isLoading = false;
    let hasMore = true;
    let currentFilters = { gender: 'all', minAge: 18, maxAge: 100 };
    let lastLikeTime = 0;
    let likeCount = 0;
    const LIKE_LIMIT = 30;
    const LIKE_WINDOW = 60000;

    function showMessage(el, msg, isErr) {
        el.innerHTML = `<div class="${isErr ? 'error' : 'success'}">${msg}</div>`;
        setTimeout(() => { if(el) el.innerHTML = ''; }, 4000);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function formatTime(date) {
        if (!date) return '';
        const d = date.toDate ? date.toDate() : new Date(date);
        return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function showLoading() {
        let overlay = document.querySelector('.loading-overlay');
        if (!overlay) {
            overlay = document.createElement('div');
            overlay.className = 'loading-overlay';
            overlay.innerHTML = '<div class="loading-spinner-large"></div>';
            document.body.appendChild(overlay);
        }
        overlay.style.display = 'flex';
    }

    function hideLoading() {
        const overlay = document.querySelector('.loading-overlay');
        if (overlay) overlay.style.display = 'none';
    }

    function checkRateLimit() {
        const now = Date.now();
        if (now - lastLikeTime < LIKE_WINDOW) {
            likeCount++;
            if (likeCount > LIKE_LIMIT) {
                return false;
            }
        } else {
            likeCount = 1;
            lastLikeTime = now;
        }
        return true;
    }

    function showMatchPopup(name, matchId, otherId) {
        const overlay = document.createElement('div');
        overlay.className = 'match-popup-overlay';
        const popup = document.createElement('div');
        popup.className = 'match-popup';
        popup.innerHTML = `
            <div style="font-size:50px;">❤️</div>
            <h3>It's a Match! 🎉</h3>
            <p>You and ${escapeHtml(name)} have liked each other.</p>
            <button id="closeMatchPopup">Send a Message</button>
        `;
        document.body.appendChild(overlay);
        document.body.appendChild(popup);
        
        document.getElementById('closeMatchPopup').onclick = () => {
            overlay.remove();
            popup.remove();
            openChat(matchId, otherId);
        };
        
        setTimeout(() => {
            if(overlay.parentNode) overlay.remove();
            if(popup.parentNode) popup.remove();
        }, 5000);
    }

    // Gender selection for signup
    document.querySelectorAll('#signupGender .gender-option').forEach(g => {
        g.onclick = () => {
            document.querySelectorAll('#signupGender .gender-option').forEach(opt => opt.classList.remove('selected'));
            g.classList.add('selected');
            selectedGender = g.dataset.gender;
        };
    });

    document.querySelectorAll('#interestsGrid .interest-chip').forEach(c => {
        c.onclick = () => {
            c.classList.toggle('selected');
            let v = c.dataset.int;
            if (selectedInterests.includes(v)) {
                selectedInterests = selectedInterests.filter(i => i !== v);
            } else {
                selectedInterests.push(v);
            }
        };
    });

    document.getElementById('loginTab').onclick = () => {
        document.getElementById('loginTab').classList.add('active');
        document.getElementById('signupTab').classList.remove('active');
        document.getElementById('loginDiv').classList.remove('hidden');
        document.getElementById('signupDiv').classList.add('hidden');
    };
    document.getElementById('signupTab').onclick = () => {
        document.getElementById('signupTab').classList.add('active');
        document.getElementById('loginTab').classList.remove('active');
        document.getElementById('signupDiv').classList.remove('hidden');
        document.getElementById('loginDiv').classList.add('hidden');
    };

    // SIGNUP
    document.getElementById('doSignup').onclick = async () => {
        const name = document.getElementById('signupName').value.trim();
        const age = parseInt(document.getElementById('signupAge').value);
        const email = document.getElementById('signupEmail').value.trim();
        const password = document.getElementById('signupPassword').value;
        const bio = document.getElementById('signupBio').value.trim();
        const preference = document.getElementById('signupPreference').value;
        const msgDiv = document.getElementById('signupMsg');

        if (!name || !age || !email || !password) {
            return showMessage(msgDiv, 'Fill all fields', true);
        }
        if (selectedInterests.length === 0) {
            return showMessage(msgDiv, 'Select an interest', true);
        }
        if (age < 18) {
            return showMessage(msgDiv, 'You must be 18+', true);
        }
        if (password.length < 6) {
            return showMessage(msgDiv, 'Password must be at least 6 characters', true);
        }

        const btn = document.getElementById('doSignup');
        btn.disabled = true;
        btn.innerHTML = '<span class="loading-spinner"></span> Creating...';

        try {
            const userCredential = await auth.createUserWithEmailAndPassword(email, password);
            const user = userCredential.user;

            await db.collection('users').doc(user.uid).set({
                uid: user.uid,
                name: name,
                age: age,
                gender: selectedGender,
                preference: preference,
                bio: bio || '',
                interests: selectedInterests,
                photo_url: '',
                likes: [],
                matches: [],
                blocked: [],
                online: true,
                lastSeen: firebase.firestore.FieldValue.serverTimestamp(),
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });

            showMessage(msgDiv, '✅ Account created! You can now login.', false);
            
            document.getElementById('signupName').value = '';
            document.getElementById('signupAge').value = '';
            document.getElementById('signupEmail').value = '';
            document.getElementById('signupPassword').value = '';
            document.getElementById('signupBio').value = '';
            selectedInterests = [];
            document.querySelectorAll('#interestsGrid .interest-chip').forEach(i => i.classList.remove('selected'));
            
            setTimeout(() => document.getElementById('loginTab').click(), 2000);
        } catch (err) {
            showMessage(msgDiv, '❌ ' + err.message, true);
        } finally {
            btn.disabled = false;
            btn.innerHTML = 'Create Account';
        }
    };

    // LOGIN
    document.getElementById('doLogin').onclick = async () => {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        const msgDiv = document.getElementById('loginMsg');

        if (!email || !password) {
            return showMessage(msgDiv, 'Enter email and password', true);
        }

        const btn = document.getElementById('doLogin');
        btn.disabled = true;
        btn.innerHTML = '<span class="loading-spinner"></span> Logging in...';

        try {
            const userCredential = await auth.signInWithEmailAndPassword(email, password);
            currentUser = userCredential.user;

            const userDoc = await db.collection('users').doc(currentUser.uid).get();
            if (userDoc.exists) {
                currentProfile = userDoc.data();
            } else {
                throw new Error('Profile not found');
            }

            await db.collection('users').doc(currentUser.uid).update({
                online: true,
                lastSeen: firebase.firestore.FieldValue.serverTimestamp()
            });

            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('app').style.display = 'block';

            updateProfileUI();
            loadCards(true);
            loadMatches();
            setupHeartbeat();
        } catch (err) {
            showMessage(msgDiv, '❌ ' + err.message, true);
        } finally {
            btn.disabled = false;
            btn.innerHTML = 'Login';
        }
    };

    function setupHeartbeat() {
        const userRef = db.collection('users').doc(currentUser.uid);
        
        const interval = setInterval(() => {
            if (currentUser) {
                userRef.update({
                    online: true,
                    lastSeen: firebase.firestore.FieldValue.serverTimestamp()
                }).catch(() => {});
            } else {
                clearInterval(interval);
            }
        }, 60000);
        
        window.addEventListener('beforeunload', () => {
            userRef.update({ online: false, lastSeen: firebase.firestore.FieldValue.serverTimestamp() });
        });
    }

    function updateProfileUI() {
        if (!currentProfile) return;
        document.getElementById('profileName').innerText = currentProfile.name;
        document.getElementById('profileEmail').innerText = currentUser.email;
        document.getElementById('profileAge').innerText = currentProfile.age ? currentProfile.age + ' years old' : 'Age not set';
        document.getElementById('profileBio').innerText = currentProfile.bio || 'No bio yet';
        if (currentProfile.photo_url) document.getElementById('profileImg').src = currentProfile.photo_url;
        document.getElementById('profileInterests').innerHTML = (currentProfile.interests || []).map(i => `<span class="badge">${escapeHtml(i)}</span>`).join('');
        
        let preferenceText = 'Looking for: ';
        if (currentProfile.preference === 'male') preferenceText += 'Men';
        else if (currentProfile.preference === 'female') preferenceText += 'Women';
        else if (currentProfile.preference === 'other') preferenceText += 'Other';
        else preferenceText += 'Everyone';
        document.getElementById('profilePreference').innerHTML = `<span class="badge">${preferenceText}</span>`;
    }

    // ========== FIXED RESET FUNCTION ==========
    document.getElementById('resetSwipesBtn').onclick = async () => {
        const confirmed = confirm('⚠️ WARNING: This will:\n\n1. Reset ALL your swipes (you will see everyone again)\n2. Delete ALL your matches\n3. Delete ALL chat messages\n\nThis CANNOT be undone!\n\nAre you ABSOLUTELY sure?');
        if (!confirmed) return;
        
        showLoading();
        
        const btn = document.getElementById('resetSwipesBtn');
        const originalText = btn.innerText;
        btn.disabled = true;
        btn.innerText = 'Resetting...';
        
        try {
            const matchIds = currentProfile.matches || [];
            
            // 1. Delete all match documents from matches collection
            for (const matchId of matchIds) {
                await db.collection('matches').doc(matchId).delete().catch(() => {});
            }
            
            // 2. Delete all messages for each match
            for (const matchId of matchIds) {
                const messagesSnapshot = await db.collection('messages')
                    .where('matchId', '==', matchId)
                    .get();
                
                const batch = db.batch();
                messagesSnapshot.forEach(doc => {
                    batch.delete(doc.ref);
                });
                await batch.commit().catch(() => {});
            }
            
            // 3. Reset user document
            await db.collection('users').doc(currentUser.uid).update({
                likes: [],
                matches: []
            });
            
            // 4. Update local profile
            currentProfile.likes = [];
            currentProfile.matches = [];
            
            // 5. Clear local lists
            usersList = [];
            currentSwipeIndex = 0;
            lastDoc = null;
            hasMore = true;
            
            // 6. Reload everything
            await loadCards(true);
            await loadMatches();
            
            alert('✅ All swipes, matches, and messages have been reset! You can now see all users again.');
            
        } catch (err) {
            console.error('Reset error:', err);
            alert('Error resetting: ' + err.message);
        } finally {
            btn.disabled = false;
            btn.innerText = originalText;
            hideLoading();
        }
    };

    document.getElementById('blockInChatBtn').onclick = async () => {
        if (!currentOtherId) return;
        if (confirm('Block this user? You will no longer see them or receive messages.')) {
            await db.collection('users').doc(currentUser.uid).update({
                blocked: firebase.firestore.FieldValue.arrayUnion(currentOtherId)
            });
            alert('User blocked');
            document.getElementById('chatBackBtn').click();
        }
    };

    document.getElementById('blockedUsersBtn').onclick = async () => {
        const blocked = currentProfile.blocked || [];
        if (blocked.length === 0) {
            alert('No blocked users');
            return;
        }
        
        let list = 'Blocked users:\n';
        for (const uid of blocked) {
            const userDoc = await db.collection('users').doc(uid).get();
            if (userDoc.exists) {
                list += `- ${userDoc.data().name}\n`;
            }
        }
        alert(list);
    };

    document.getElementById('reportUserBtn').onclick = () => {
        const reportedEmail = prompt('Enter the email of the user you want to report:');
        if (reportedEmail) {
            alert('Report submitted. Our team will review it.');
            console.log('Reported user:', reportedEmail);
        }
    };

    // Photo Upload with compression
    document.getElementById('uploadPhotoBtn').onclick = () => document.getElementById('photoUpload').click();
    
    document.getElementById('photoUpload').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        const validExts = ['jpg', 'jpeg', 'png', 'webp'];
        const ext = file.name.split('.').pop().toLowerCase();
        if (!validExts.includes(ext)) {
            alert('Invalid file type. Allowed: JPG, PNG, WEBP');
            return;
        }
        
        const btn = document.getElementById('uploadPhotoBtn');
        btn.disabled = true;
        btn.innerText = 'Compressing...';
        
        try {
            const compressed = await new Promise((resolve, reject) => {
                new Compressor(file, {
                    quality: 0.7,
                    maxWidth: 1200,
                    maxHeight: 1200,
                    success(result) { resolve(result); },
                    error(err) { reject(err); }
                });
            });
            
            btn.innerText = 'Uploading...';
            
            const formData = new FormData();
            formData.append('file', compressed);
            formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
            
            const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`, {
                method: 'POST',
                body: formData
            });
            
            const data = await response.json();
            
            if (data.error) throw new Error(data.error.message);
            if (!data.secure_url) throw new Error('Upload failed');
            
            await db.collection('users').doc(currentUser.uid).update({ photo_url: data.secure_url });
            currentProfile.photo_url = data.secure_url;
            document.getElementById('profileImg').src = data.secure_url;
            alert('✅ Photo updated!');
        } catch (err) {
            alert('Upload failed: ' + err.message);
        } finally {
            btn.disabled = false;
            btn.innerText = '📸 Upload Photo';
            document.getElementById('photoUpload').value = '';
        }
    };

    // Filters
    document.getElementById('filterToggleBtn').onclick = () => {
        document.getElementById('filtersPanel').classList.toggle('show');
    };

    document.getElementById('applyFiltersBtn').onclick = () => {
        currentFilters = {
            gender: document.getElementById('filterGender').value,
            minAge: parseInt(document.getElementById('filterMinAge').value) || 18,
            maxAge: parseInt(document.getElementById('filterMaxAge').value) || 100
        };
        lastDoc = null;
        hasMore = true;
        loadCards(true);
    };

    async function loadCards(reset = true) {
        if (isLoading) return;
        isLoading = true;
        
        try {
            const likes = currentProfile.likes || [];
            const matches = currentProfile.matches || [];
            const blocked = currentProfile.blocked || [];
            const preference = currentProfile.preference || 'all';
            
            let query = db.collection('users')
                .where('uid', '!=', currentUser.uid)
                .limit(10);
            
            if (!reset && lastDoc) {
                query = query.startAfter(lastDoc);
            }
            
            const usersSnapshot = await query.get();
            
            if (usersSnapshot.empty) {
                if (reset) {
                    document.getElementById('cards').innerHTML = '<div class="empty">No more profiles! Click "Reset All Swipes" to see everyone again.</div>';
                }
                hasMore = false;
                document.getElementById('loadMoreTrigger').classList.add('hidden');
                isLoading = false;
                return;
            }
            
            lastDoc = usersSnapshot.docs[usersSnapshot.docs.length - 1];
            hasMore = usersSnapshot.docs.length === 10;
            
            const newUsers = [];
            usersSnapshot.forEach(doc => {
                const userData = doc.data();
                
                if (likes.includes(userData.uid)) return;
                if (matches.includes(userData.uid)) return;
                if (blocked.includes(userData.uid)) return;
                if (currentFilters.gender !== 'all' && userData.gender !== currentFilters.gender) return;
                if (userData.age < currentFilters.minAge || userData.age > currentFilters.maxAge) return;
                if (preference !== 'all' && userData.gender !== preference) return;
                
                newUsers.push({ id: doc.id, ...userData });
            });
            
            if (reset) {
                usersList = newUsers;
                currentSwipeIndex = 0;
                showCard();
            } else {
                usersList.push(...newUsers);
            }
            
            if (hasMore) {
                document.getElementById('loadMoreTrigger').classList.remove('hidden');
            } else {
                document.getElementById('loadMoreTrigger').classList.add('hidden');
            }
            
        } catch (err) {
            console.error('Load cards error:', err);
            if (reset) {
                document.getElementById('cards').innerHTML = '<div class="empty">Error loading profiles</div>';
            }
        } finally {
            isLoading = false;
        }
    }

    function showCard() {
        if (currentSwipeIndex >= usersList.length) {
            if (hasMore) {
                loadCards(false);
            } else {
                document.getElementById('cards').innerHTML = '<div class="empty">No more profiles! Click "Reset All Swipes" on Profile page to see everyone again.</div>';
            }
            return;
        }
        
        const u = usersList[currentSwipeIndex];
        document.getElementById('cards').innerHTML = `
            <div class="swipe-card">
                <div class="card-img">
                    ${u.photo_url ? `<img src="${u.photo_url}">` : '👤'}
                </div>
                <div class="card-info">
                    <div class="card-name">${escapeHtml(u.name)}${u.online ? ' 🟢' : ''}</div>
                    <div class="card-age">${u.age} years old</div>
                    <div>${(u.interests || []).map(i => `<span class="badge">${escapeHtml(i)}</span>`).join('')}</div>
                    ${u.bio ? `<div style="margin-top:10px; color:#666;">${escapeHtml(u.bio.substring(0, 100))}</div>` : ''}
                </div>
            </div>
        `;
    }

    document.getElementById('likeBtn').onclick = async () => {
        if (currentSwipeIndex >= usersList.length) return;
        
        if (!checkRateLimit()) {
            alert('⏳ Too many likes! Please wait a moment.');
            return;
        }
        
        const likedUser = usersList[currentSwipeIndex];
        
        const likeBtn = document.getElementById('likeBtn');
        likeBtn.disabled = true;
        
        try {
            const newLikes = [...(currentProfile.likes || []), likedUser.uid];
            await db.collection('users').doc(currentUser.uid).update({ likes: newLikes });
            currentProfile.likes = newLikes;
            
            const likedUserDoc = await db.collection('users').doc(likedUser.uid).get();
            const likedUserData = likedUserDoc.data();
            
            const isMatch = likedUserData.likes && likedUserData.likes.includes(currentUser.uid);
            
            if (isMatch) {
                const matchId = [currentUser.uid, likedUser.uid].sort().join('_');
                await db.collection('matches').doc(matchId).set({
                    id: matchId,
                    user1: currentUser.uid,
                    user2: likedUser.uid,
                    created_at: firebase.firestore.FieldValue.serverTimestamp(),
                    updated_at: firebase.firestore.FieldValue.serverTimestamp(),
                    lastMessage: '',
                    lastMessageTime: null
                });
                
                await db.collection('users').doc(currentUser.uid).update({
                    matches: firebase.firestore.FieldValue.arrayUnion(matchId)
                });
                await db.collection('users').doc(likedUser.uid).update({
                    matches: firebase.firestore.FieldValue.arrayUnion(matchId)
                });
                
                currentProfile.matches = [...(currentProfile.matches || []), matchId];
                showMatchPopup(likedUser.name, matchId, likedUser.uid);
                await loadMatches();
            }
            
            currentSwipeIndex++;
            showCard();
        } catch (err) {
            console.error('Like error:', err);
        } finally {
            likeBtn.disabled = false;
        }
    };

    document.getElementById('passBtn').onclick = () => {
        if (currentSwipeIndex >= usersList.length) return;
        currentSwipeIndex++;
        showCard();
    };

    async function loadMatches() {
        try {
            const matchIds = currentProfile.matches || [];
            
            if (matchIds.length === 0) {
                document.getElementById('matchesList').innerHTML = '<div class="empty">No matches yet. Like someone who likes you back!</div>';
                return;
            }
            
            let html = '';
            for (const matchId of matchIds) {
                const ids = matchId.split('_');
                const otherId = ids[0] === currentUser.uid ? ids[1] : ids[0];
                
                const [matchDoc, otherDoc] = await Promise.all([
                    db.collection('matches').doc(matchId).get(),
                    db.collection('users').doc(otherId).get()
                ]);
                
                if (!otherDoc.exists) continue;
                
                const match = matchDoc.data() || {};
                const other = otherDoc.data();
                
                const preview = match.lastMessage ? match.lastMessage.substring(0, 40) + (match.lastMessage.length > 40 ? '...' : '') : 'Tap to chat 💬';
                let timeAgo = '';
                if (match.lastMessageTime) {
                    const date = match.lastMessageTime.toDate();
                    const diff = Math.floor((new Date() - date) / 60000);
                    if (diff < 1) timeAgo = 'just now';
                    else if (diff < 60) timeAgo = `${diff}m ago`;
                    else timeAgo = `${Math.floor(diff / 60)}h ago`;
                }
                
                html += `
                    <div class="match-card" data-match-id="${matchId}" data-other-id="${otherId}">
                        <div class="match-avatar">
                            ${other.photo_url ? `<img src="${other.photo_url}">` : '👤'}
                            ${other.online ? '<div class="online-dot"></div>' : ''}
                        </div>
                        <div style="flex:1">
                            <div class="match-name">${escapeHtml(other.name)}</div>
                            <div class="match-preview">${escapeHtml(preview)}</div>
                        </div>
                        ${timeAgo ? `<div class="match-time">${timeAgo}</div>` : ''}
                    </div>
                `;
            }
            document.getElementById('matchesList').innerHTML = html;
            
            document.querySelectorAll('.match-card').forEach(card => {
                card.onclick = () => {
                    openChat(card.dataset.matchId, card.dataset.otherId);
                };
            });
        } catch (err) {
            console.error('Load matches error:', err);
            document.getElementById('matchesList').innerHTML = '<div class="empty">No matches yet</div>';
        }
    }

    async function openChat(matchId, otherId) {
        currentMatchId = matchId;
        currentOtherId = otherId;
        
        const otherDoc = await db.collection('users').doc(otherId).get();
        const other = otherDoc.data();
        document.getElementById('chatPartnerName').innerText = other.name;
        
        if (presenceUnsubscribe) presenceUnsubscribe();
        presenceUnsubscribe = db.collection('users').doc(otherId).onSnapshot((doc) => {
            if (doc.exists) {
                const statusDiv = document.getElementById('chatPartnerStatus');
                if (doc.data().online) {
                    statusDiv.innerText = 'Online';
                    statusDiv.className = 'chat-header-status online';
                } else {
                    const lastSeen = doc.data().lastSeen;
                    if (lastSeen) {
                        const date = lastSeen.toDate();
                        const diff = Math.floor((new Date() - date) / 60000);
                        if (diff < 1) statusDiv.innerText = 'Online recently';
                        else if (diff < 60) statusDiv.innerText = `Last seen ${diff}m ago`;
                        else statusDiv.innerText = `Last seen ${Math.floor(diff / 60)}h ago`;
                    } else {
                        statusDiv.innerText = 'Offline';
                    }
                    statusDiv.className = 'chat-header-status';
                }
            }
        });
        
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('chatPage').classList.add('active');
        
        if (chatUnsubscribe) {
            chatUnsubscribe();
        }
        
        chatUnsubscribe = db.collection('messages')
            .where('matchId', '==', matchId)
            .orderBy('createdAt', 'asc')
            .onSnapshot((snapshot) => {
                const container = document.getElementById('chatMessages');
                const wasEmpty = container.innerHTML === '' || container.querySelector('.empty');
                
                if (snapshot.empty) {
                    container.innerHTML = '<div class="empty">💬 No messages yet. Say hello! 👋</div>';
                    return;
                }
                
                if (wasEmpty) container.innerHTML = '';
                
                snapshot.docChanges().forEach((change) => {
                    if (change.type === 'added') {
                        addMessageOptimized(change.doc.data());
                    }
                });
                
                container.scrollTop = container.scrollHeight;
            });
        
        setupTypingListener();
    }
    
    function addMessageOptimized(msg) {
        const container = document.getElementById('chatMessages');
        const isSent = msg.senderId === currentUser.uid;
        const messageDiv = document.createElement('div');
        messageDiv.className = `bubble ${isSent ? 'sent' : 'received'}`;
        messageDiv.innerHTML = `
            <div>${escapeHtml(msg.message)}</div>
            <div class="message-time">${formatTime(msg.createdAt)}</div>
        `;
        container.appendChild(messageDiv);
    }

    document.getElementById('chatInput').addEventListener('input', () => {
        if (!currentMatchId) return;
        
        if (typingTimeout) clearTimeout(typingTimeout);
        
        db.collection('matches').doc(currentMatchId).update({
            typing: currentUser.uid
        }).catch(() => {});
        
        typingTimeout = setTimeout(() => {
            db.collection('matches').doc(currentMatchId).update({
                typing: null
            }).catch(() => {});
        }, 1000);
    });

    function setupTypingListener() {
        if (!currentMatchId) return;
        
        db.collection('matches').doc(currentMatchId).onSnapshot((doc) => {
            if (doc.exists && doc.data().typing === currentOtherId) {
                document.getElementById('typingIndicator').innerText = `${document.getElementById('chatPartnerName').innerText} is typing...`;
                document.getElementById('typingIndicator').classList.remove('hidden');
            } else {
                document.getElementById('typingIndicator').classList.add('hidden');
            }
        });
    }

    document.getElementById('sendMessageBtn').onclick = async () => {
        const input = document.getElementById('chatInput');
        const messageText = input.value.trim();
        
        if (!messageText) {
            alert("Please type a message first!");
            return;
        }
        
        if (!currentMatchId) {
            alert("Error: No active chat. Please go back and select a match.");
            return;
        }
        
        const sendBtn = document.getElementById('sendMessageBtn');
        sendBtn.disabled = true;
        sendBtn.innerText = 'Sending...';
        
        try {
            const messageData = {
                matchId: currentMatchId,
                senderId: currentUser.uid,
                message: messageText,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            
            await db.collection('messages').add(messageData);
            
            await db.collection('matches').doc(currentMatchId).update({
                lastMessage: messageText,
                lastMessageTime: firebase.firestore.FieldValue.serverTimestamp(),
                typing: null
            });
            
            input.value = '';
            console.log("✅ Message sent successfully!");
            
        } catch (error) {
            console.error("❌ Error sending message:", error);
            
            if (error.message && error.message.includes('index')) {
                const indexUrl = error.message.match(/https:\/\/console\.firebase\.google\.com[^\s]+/);
                if (indexUrl) {
                    alert("⚠️ Firestore index needed. Click OK to create it.\n\nYour message was saved but ordering requires an index.");
                    window.open(indexUrl[0], '_blank');
                } else {
                    alert("Error sending message: " + error.message);
                }
            } else {
                alert("Error sending message: " + error.message);
            }
        } finally {
            sendBtn.disabled = false;
            sendBtn.innerText = 'Send';
        }
    };

    document.getElementById('chatInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            document.getElementById('sendMessageBtn').click();
        }
    });

    document.getElementById('chatBackBtn').onclick = () => {
        if (chatUnsubscribe) {
            chatUnsubscribe();
            chatUnsubscribe = null;
        }
        if (presenceUnsubscribe) {
            presenceUnsubscribe();
            presenceUnsubscribe = null;
        }
        document.getElementById('chatPage').classList.remove('active');
        document.getElementById('matchesPage').classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.querySelector('.nav-item[data-page="matches"]').classList.add('active');
        loadMatches();
    };

    document.getElementById('editProfileBtn').onclick = async () => {
        const newName = prompt('Enter new name:', currentProfile.name);
        const newAge = prompt('Enter new age:', currentProfile.age);
        const newBio = prompt('Enter new bio:', currentProfile.bio || '');
        const newPreference = prompt('Enter preference (male/female/other/all):', currentProfile.preference || 'all');
        
        const updates = {};
        if (newName && newName.trim() && newName !== currentProfile.name) updates.name = newName.trim();
        if (newAge && !isNaN(parseInt(newAge)) && parseInt(newAge) >= 18 && parseInt(newAge) <= 100) updates.age = parseInt(newAge);
        if (newBio !== undefined && newBio !== currentProfile.bio) updates.bio = newBio.trim() || null;
        if (newPreference && ['male', 'female', 'other', 'all'].includes(newPreference)) updates.preference = newPreference;
        
        if (Object.keys(updates).length > 0) {
            try {
                await db.collection('users').doc(currentUser.uid).update(updates);
                Object.assign(currentProfile, updates);
                updateProfileUI();
                alert('✅ Profile updated!');
            } catch (err) {
                alert('Failed to update profile');
            }
        }
    };

    document.getElementById('logoutBtn').onclick = async () => {
        await db.collection('users').doc(currentUser.uid).update({
            online: false,
            lastSeen: firebase.firestore.FieldValue.serverTimestamp()
        });
        if (chatUnsubscribe) chatUnsubscribe();
        await auth.signOut();
        location.reload();
    };

    document.querySelectorAll('.nav-item').forEach(item => {
        item.onclick = () => {
            const page = item.dataset.page;
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            item.classList.add('active');
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(page + 'Page').classList.add('active');
            if (page === 'swipe') {
                lastDoc = null;
                hasMore = true;
                loadCards(true);
            }
            if (page === 'matches') loadMatches();
        };
    });

    const observer = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting && hasMore && !isLoading && usersList.length > 0) {
            loadCards(false);
        }
    });
    
    auth.onAuthStateChanged(async (user) => {
        if (user) {
            currentUser = user;
            const userDoc = await db.collection('users').doc(user.uid).get();
            if (userDoc.exists) {
                currentProfile = userDoc.data();
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                updateProfileUI();
                loadCards(true);
                loadMatches();
                console.log("✅ User logged in:", user.email);
                
                const trigger = document.getElementById('loadMoreTrigger');
                if (trigger) observer.observe(trigger);
            }
        }
    });
</script>
</body>
