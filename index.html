<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
        authDomain: "teamup-68a21.firebaseapp.com",
        projectId: "teamup-68a21",
        storageBucket: "teamup-68a21.firebasestorage.app",
        messagingSenderId: "379106762572",
        appId: "1:379106762572:web:b80b61d82df788cc0339e9"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null, currentProfile = null;
    let usersList = [], currentSwipeIndex = 0;
    let currentChatMatchId = null, currentChatOtherId = null;
    let messagesUnsubscribe = null;
    let selectedInterests = [];

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    
    function showToast(msg, isSuccess = false) {
        let toast = document.createElement('div');
        toast.className = 'notification-toast';
        if(isSuccess) toast.style.background = '#4caf50';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(()=>toast.remove(), 3000);
    }

    // Send direct message - WORKS WITHOUT MATCHING!
    async function sendDirectMessage(targetUserId, targetName, messageText) {
        if(!messageText.trim()) { showToast("Please write a message first"); return false; }
        if(!currentUser) { showToast("Please login first"); return false; }
        
        try {
            // Create a unique conversation ID
            const matchId = [currentUser.uid, targetUserId].sort().join('_');
            const matchRef = db.collection('matches').doc(matchId);
            const matchDoc = await matchRef.get();
            
            if(!matchDoc.exists) {
                // Create new conversation
                await matchRef.set({
                    id: matchId,
                    user1: currentUser.uid,
                    user2: targetUserId,
                    created_at: firebase.firestore.FieldValue.serverTimestamp(),
                    updated_at: firebase.firestore.FieldValue.serverTimestamp(),
                    lastMessage: messageText.substring(0, 50),
                    lastMessageTime: firebase.firestore.FieldValue.serverTimestamp(),
                    unreadCountUser1: 0,
                    unreadCountUser2: 0
                });
                
                // Add to both users' matches list
                await db.collection('users').doc(currentUser.uid).update({
                    matches: firebase.firestore.FieldValue.arrayUnion(matchId)
                });
                await db.collection('users').doc(targetUserId).update({
                    matches: firebase.firestore.FieldValue.arrayUnion(matchId)
                });
                
                if(!currentProfile.matches) currentProfile.matches = [];
                currentProfile.matches.push(matchId);
            } else {
                await matchRef.update({
                    lastMessage: messageText.substring(0, 50),
                    lastMessageTime: firebase.firestore.FieldValue.serverTimestamp()
                });
            }
            
            // Add the message
            const messagesRef = matchRef.collection('messages');
            await messagesRef.add({
                type: 'text',
                text: messageText,
                senderId: currentUser.uid,
                receiverId: targetUserId,
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                seen: false
            });
            
            // Increment unread count for recipient
            const data = (await matchRef.get()).data();
            const unreadField = data.user1 === targetUserId ? 'unreadCountUser1' : 'unreadCountUser2';
            await matchRef.update({ [unreadField]: firebase.firestore.FieldValue.increment(1) });
            
            showToast(`✅ Message sent to ${targetName}!`, true);
            await updateUnreadBadge();
            loadMatches();
            return true;
        } catch(error) {
            console.error("Send message error:", error);
            if(error.code === 'permission-denied') {
                showToast("⚠️ Firebase Security Rules need to be updated. Check console for instructions.");
                console.log("%c🔧 FIREBASE SECURITY RULES NEEDED:\n\nGo to Firebase Console → Firestore Database → Rules\n\nCopy and paste these rules:\n\nrules_version = '2';\nservice cloud.firestore {\n  match /databases/{database}/documents {\n    match /users/{userId} {\n      allow read, write: if request.auth != null;\n    }\n    match /matches/{matchId} {\n      allow read, write: if request.auth != null;\n    }\n    match /matches/{matchId}/messages/{message} {\n      allow read, write: if request.auth != null;\n    }\n  }\n}", "color: #ff6b6b; font-size: 14px; font-weight: bold;");
            } else {
                showToast("Error: " + error.message);
            }
            return false;
        }
    }

    async function sendLike(targetUserId, targetName) {
        const likes = currentProfile.likes || [];
        if(likes.includes(targetUserId)) { showToast('Already liked'); return false; }
        try {
            await db.collection('users').doc(currentUser.uid).update({
                likes: firebase.firestore.FieldValue.arrayUnion(targetUserId)
            });
            currentProfile.likes.push(targetUserId);
            await db.collection('users').doc(targetUserId).update({
                incomingLikes: firebase.firestore.FieldValue.arrayUnion(currentUser.uid)
            });
            showToast(`❤️ Liked ${targetName}`);
            
            const otherDoc = await db.collection('users').doc(targetUserId).get();
            const otherLikes = otherDoc.data()?.likes || [];
            if(otherLikes.includes(currentUser.uid)) {
                const matchId = [currentUser.uid, targetUserId].sort().join('_');
                await db.collection('matches').doc(matchId).set({
                    id: matchId, user1: currentUser.uid, user2: targetUserId,
                    created_at: firebase.firestore.FieldValue.serverTimestamp(),
                    unreadCountUser1: 0, unreadCountUser2: 0
                }, { merge: true });
                await db.collection('users').doc(currentUser.uid).update({
                    matches: firebase.firestore.FieldValue.arrayUnion(matchId)
                });
                await db.collection('users').doc(targetUserId).update({
                    matches: firebase.firestore.FieldValue.arrayUnion(matchId)
                });
                showToast(`🎉 It's a match with ${targetName}!`);
                loadMatches();
            }
            return true;
        } catch(error) {
            console.error("Like error:", error);
            return false;
        }
    }

    async function loadCards() {
        try {
            const likes = currentProfile.likes || [];
            const matches = currentProfile.matches || [];
            const usersSnapshot = await db.collection('users').where('uid', '!=', currentUser.uid).get();
            let users = [];
            for(const doc of usersSnapshot.docs) {
                const data = doc.data();
                if(likes.includes(doc.id) || matches.includes(doc.id)) continue;
                users.push({ id: doc.id, ...data, currentPhotoIdx: 0 });
            }
            users = users.sort(() => Math.random() - 0.5);
            usersList = users;
            currentSwipeIndex = 0;
            if(usersList.length === 0) {
                document.getElementById('cards').innerHTML = '<div class="empty">✨ No more profiles! Reset swipes in profile ✨</div>';
            } else {
                showCard();
            }
        } catch(error) {
            console.error("Load cards error:", error);
            document.getElementById('cards').innerHTML = '<div class="empty">Error loading profiles</div>';
        }
    }

    function showCard() {
        if(currentSwipeIndex >= usersList.length) {
            document.getElementById('cards').innerHTML = '<div class="empty">🎉 You\'ve seen everyone! Reset swipes to see more 🎉</div>';
            return;
        }
        const u = usersList[currentSwipeIndex];
        const photos = u.photos || [];
        const photoUrl = u.photo_url || (photos[0]) || '';
        const photoHtml = photoUrl ? `<img src="${photoUrl}" onclick="window.open('${photoUrl}','_blank')">` : '<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:64px;">👤</div>';
        
        const cardHtml = `
            <div class="swipe-card">
                <div class="card-img">
                    ${photoHtml}
                    ${photos.length > 1 ? `
                        <button class="photo-arrow left" onclick="event.stopPropagation(); changePhoto(${currentSwipeIndex}, -1)">◀</button>
                        <button class="photo-arrow right" onclick="event.stopPropagation(); changePhoto(${currentSwipeIndex}, 1)">▶</button>
                        <div class="photo-nav" id="photoNav-${currentSwipeIndex}">
                            ${photos.map((_, idx) => `<div class="photo-dot ${idx === (u.currentPhotoIdx||0) ? 'active' : ''}" onclick="event.stopPropagation(); goToPhoto(${currentSwipeIndex}, ${idx})"></div>`).join('')}
                        </div>
                    ` : ''}
                </div>
                <div class="card-info">
                    <div class="card-name">${escapeHtml(u.name)} <span class="card-age">, ${u.age || '?'}</span></div>
                    <div class="card-distance">📍 Distance unknown</div>
                    <div>${(u.interests || []).map(i => `<span class="badge">${escapeHtml(i)}</span>`).join('')}</div>
                    ${u.bio ? `<p style="margin-top:12px; color:var(--text-secondary);">${escapeHtml(u.bio.substring(0, 80))}</p>` : ''}
                </div>
                <div class="direct-message-area">
                    <div class="message-input-wrapper">
                        <input type="text" id="directMsgInput_${currentSwipeIndex}" placeholder="💬 Write a message to ${escapeHtml(u.name)}..." maxlength="200" autocomplete="off">
                        <button class="send-msg-btn" onclick="sendMsgFromCard(${currentSwipeIndex})">Send</button>
                    </div>
                    <div class="quick-message-hint">⭐ Send a message without matching! They'll get it instantly ⭐</div>
                </div>
            </div>
        `;
        
        document.getElementById('cards').innerHTML = cardHtml;
    }
    
    // Global function for sending message from card
    window.sendMsgFromCard = async function(index) {
        const user = usersList[index];
        if(!user) return;
        const input = document.getElementById(`directMsgInput_${index}`);
        if(!input) return;
        const message = input.value.trim();
        if(message) {
            const btn = event?.target;
            if(btn) btn.disabled = true;
            await sendDirectMessage(user.id, user.name, message);
            if(btn) btn.disabled = false;
            input.value = '';
        } else {
            showToast("Please write a message first");
        }
    };

    window.changePhoto = (userIdx, delta) => {
        const user = usersList[userIdx];
        const photos = user.photos || [];
        if(photos.length <= 1) return;
        let newIdx = (user.currentPhotoIdx || 0) + delta;
        if(newIdx < 0) newIdx = photos.length - 1;
        if(newIdx >= photos.length) newIdx = 0;
        user.currentPhotoIdx = newIdx;
        const img = document.querySelector('.card-img img');
        if(img) img.src = photos[newIdx];
        const navContainer = document.getElementById(`photoNav-${userIdx}`);
        if(navContainer) {
            const dots = navContainer.querySelectorAll('.photo-dot');
            dots.forEach((dot, idx) => { if(idx === newIdx) dot.classList.add('active'); else dot.classList.remove('active'); });
        }
    };
    
    window.goToPhoto = (userIdx, photoIdx) => {
        const user = usersList[userIdx];
        const photos = user.photos || [];
        if(photoIdx >= photos.length) return;
        user.currentPhotoIdx = photoIdx;
        const img = document.querySelector('.card-img img');
        if(img) img.src = photos[photoIdx];
        const navContainer = document.getElementById(`photoNav-${userIdx}`);
        if(navContainer) {
            const dots = navContainer.querySelectorAll('.photo-dot');
            dots.forEach((dot, idx) => { if(idx === photoIdx) dot.classList.add('active'); else dot.classList.remove('active'); });
        }
    };

    document.getElementById('likeBtn').onclick = async () => {
        if(currentSwipeIndex >= usersList.length) return;
        const user = usersList[currentSwipeIndex];
        await sendLike(user.id, user.name);
        currentSwipeIndex++;
        showCard();
    };
    
    document.getElementById('passBtn').onclick = () => {
        if(currentSwipeIndex >= usersList.length) return;
        currentSwipeIndex++;
        showCard();
    };

    async function loadMatches() {
        const matchIds = currentProfile.matches || [];
        if(matchIds.length === 0) { 
            document.getElementById('matchesList').innerHTML = '<div class="empty">💬 No conversations yet. Send a message while swiping!</div>'; 
            return; 
        }
        let html = '';
        for(const matchId of matchIds) {
            const ids = matchId.split('_');
            const otherId = ids[0] === currentUser.uid ? ids[1] : ids[0];
            const otherDoc = await db.collection('users').doc(otherId).get();
            if(!otherDoc.exists) continue;
            const other = otherDoc.data();
            const matchDoc = await db.collection('matches').doc(matchId).get();
            const lastMsg = matchDoc.data()?.lastMessage || 'Tap to chat';
            let unread = 0;
            if(matchDoc.exists) {
                const data = matchDoc.data();
                unread = data.user1 === currentUser.uid ? (data.unreadCountUser1 || 0) : (data.unreadCountUser2 || 0);
            }
            const unreadBadge = unread > 0 ? `<span style="background:#f44336; color:white; border-radius:10px; padding:2px 8px; font-size:11px; margin-left:8px;">${unread}</span>` : '';
            html += `<div class="match-card" data-match="${matchId}" data-other="${otherId}">
                        <div class="match-avatar">${other.photo_url ? `<img src="${other.photo_url}">` : '👤'}</div>
                        <div style="flex:1">
                            <div class="match-name">${escapeHtml(other.name)}${unreadBadge}</div>
                            <div class="match-last-msg">${escapeHtml(lastMsg)}</div>
                        </div>
                    </div>`;
        }
        document.getElementById('matchesList').innerHTML = html;
        document.querySelectorAll('.match-card').forEach(card => {
            card.onclick = () => openChat(card.dataset.match, card.dataset.other);
        });
        await updateUnreadBadge();
    }

    async function updateUnreadBadge() {
        if(!currentProfile?.matches) return;
        let total = 0;
        for(const matchId of currentProfile.matches) {
            const doc = await db.collection('matches').doc(matchId).get();
            if(doc.exists) {
                const data = doc.data();
                const unread = data.user1 === currentUser.uid ? (data.unreadCountUser1||0) : (data.unreadCountUser2||0);
                total += unread;
            }
        }
        const badge = document.getElementById('unreadBadge');
        if(total > 0) { badge.innerText = total>9?'9+':total; badge.classList.remove('hidden'); }
        else badge.classList.add('hidden');
    }

    async function openChat(matchId, otherId) {
        if(messagesUnsubscribe) messagesUnsubscribe();
        currentChatMatchId = matchId;
        currentChatOtherId = otherId;
        const otherDoc = await db.collection('users').doc(otherId).get();
        document.getElementById('chatPartnerName').innerText = otherDoc.data()?.name || 'User';
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('chatPage').classList.add('active');
        
        // Mark messages as seen
        const matchRef = db.collection('matches').doc(matchId);
        const matchDoc = await matchRef.get();
        if(matchDoc.exists) {
            const data = matchDoc.data();
            const unreadField = data.user1 === currentUser.uid ? 'unreadCountUser1' : 'unreadCountUser2';
            await matchRef.update({ [unreadField]: 0 });
        }
        await updateUnreadBadge();
        
        const messagesRef = matchRef.collection('messages');
        const container = document.getElementById('messagesContainer');
        
        messagesUnsubscribe = messagesRef.orderBy('createdAt', 'asc').onSnapshot(async (snapshot) => {
            if(snapshot.empty) { container.innerHTML = '<div class="empty">💬 No messages yet. Say hello! 👋</div>'; return; }
            container.innerHTML = '';
            snapshot.forEach(doc => {
                const msg = doc.data();
                const isSent = msg.senderId === currentUser.uid;
                const row = document.createElement('div');
                row.className = `message-row ${isSent ? 'sent' : 'received'}`;
                const bubble = document.createElement('div');
                bubble.className = `bubble ${isSent ? 'sent' : 'received'}`;
                bubble.innerText = msg.text;
                const time = document.createElement('div');
                time.className = 'message-time';
                const date = msg.createdAt?.toDate() || new Date();
                time.innerText = date.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
                bubble.appendChild(time);
                row.appendChild(bubble);
                container.appendChild(row);
            });
            container.scrollTop = container.scrollHeight;
            
            // Mark new messages as seen
            const unreadMessages = snapshot.docs.filter(doc => {
                const msg = doc.data();
                return msg.receiverId === currentUser.uid && !msg.seen;
            });
            for(const doc of unreadMessages) {
                await doc.ref.update({ seen: true });
            }
        });
    }

    document.getElementById('sendChatBtn').onclick = async () => {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if(!text || !currentChatMatchId) return;
        
        const messagesRef = db.collection('matches').doc(currentChatMatchId).collection('messages');
        await messagesRef.add({
            type: 'text', text, senderId: currentUser.uid, receiverId: currentChatOtherId,
            createdAt: firebase.firestore.FieldValue.serverTimestamp(), seen: false
        });
        await db.collection('matches').doc(currentChatMatchId).update({
            lastMessage: text.substring(0,50),
            lastMessageTime: firebase.firestore.FieldValue.serverTimestamp()
        });
        const matchDoc = await db.collection('matches').doc(currentChatMatchId).get();
        const data = matchDoc.data();
        const unreadField = data.user1 === currentChatOtherId ? 'unreadCountUser1' : 'unreadCountUser2';
        await db.collection('matches').doc(currentChatMatchId).update({ [unreadField]: firebase.firestore.FieldValue.increment(1) });
        input.value = '';
        await updateUnreadBadge();
        loadMatches();
    };
    
    document.getElementById('chatInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') document.getElementById('sendChatBtn').click(); });
    document.getElementById('chatBackBtn').onclick = () => {
        if(messagesUnsubscribe) messagesUnsubscribe();
        document.getElementById('chatPage').classList.remove('active');
        document.getElementById('matchesPage').classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.querySelector('.nav-item[data-page="matches"]').classList.add('active');
        loadMatches();
    };

    function updateProfileUI() {
        if(!currentProfile) return;
        document.getElementById('profileName').innerText = currentProfile.name;
        document.getElementById('profileEmail').innerText = currentUser.email;
        document.getElementById('profileBio').innerText = currentProfile.bio || 'No bio yet';
        document.getElementById('profileInterests').innerHTML = (currentProfile.interests || []).map(i => `<span class="badge">${escapeHtml(i)}</span>`).join('');
        if(currentProfile.photo_url) document.getElementById('profileAvatar').innerHTML = `<img src="${currentProfile.photo_url}">`;
        else document.getElementById('profileAvatar').innerHTML = '👤';
    }

    document.getElementById('editProfileBtn').onclick = async () => {
        const newBio = prompt('Edit bio', currentProfile.bio);
        if(newBio !== null) await db.collection('users').doc(currentUser.uid).update({ bio: newBio });
        currentProfile.bio = newBio;
        updateProfileUI();
    };
    
    document.getElementById('resetSwipesBtn').onclick = async () => {
        if(confirm('Reset all swipes? You will see all profiles again. (Your messages will NOT be deleted)')) {
            await db.collection('users').doc(currentUser.uid).update({ likes: [] });
            currentProfile.likes = [];
            loadCards();
            showToast('Swipes reset!', true);
        }
    };
    
    document.getElementById('logoutBtn').onclick = async () => { await auth.signOut(); location.reload(); };

    document.querySelectorAll('.nav-item').forEach(item => {
        item.onclick = () => {
            const page = item.dataset.page;
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            item.classList.add('active');
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            if(page === 'swipe') document.getElementById('swipePage').classList.add('active');
            if(page === 'matches') { document.getElementById('matchesPage').classList.add('active'); loadMatches(); }
            if(page === 'profile') document.getElementById('profilePage').classList.add('active');
        };
    });

    // Auth
    document.querySelectorAll('#interestsGrid .interest-chip').forEach(c => {
        c.onclick = () => { c.classList.toggle('selected'); let v = c.dataset.int; if(selectedInterests.includes(v)) selectedInterests = selectedInterests.filter(i=>i!==v); else selectedInterests.push(v); };
    });
    document.getElementById('signupTab').onclick = () => { document.getElementById('signupTab').classList.add('active'); document.getElementById('loginTab').classList.remove('active'); document.getElementById('signupDiv').classList.remove('hidden'); document.getElementById('loginDiv').classList.add('hidden'); };
    document.getElementById('loginTab').onclick = () => { document.getElementById('loginTab').classList.add('active'); document.getElementById('signupTab').classList.remove('active'); document.getElementById('loginDiv').classList.remove('hidden'); document.getElementById('signupDiv').classList.add('hidden'); };
    
    document.getElementById('doSignup').onclick = async () => {
        const name = document.getElementById('signupName').value.trim();
        const age = parseInt(document.getElementById('signupAge').value);
        const email = document.getElementById('signupEmail').value.trim();
        const pwd = document.getElementById('signupPassword').value;
        const bio = document.getElementById('signupBio').value;
        if(!name || !age || !email || !pwd) return alert('Fill all fields');
        if(selectedInterests.length===0) return alert('Select at least one interest');
        if(age<18) return alert('Must be 18+');
        try {
            const cred = await auth.createUserWithEmailAndPassword(email, pwd);
            await db.collection('users').doc(cred.user.uid).set({
                uid: cred.user.uid, name, age, bio, interests: selectedInterests, photo_url: '', photos: [],
                likes: [], matches: [], incomingLikes: [], location: null
            });
            alert('Account created! Please login.');
            document.getElementById('signupDiv').classList.add('hidden');
            document.getElementById('loginDiv').classList.remove('hidden');
            document.getElementById('signupName').value = '';
            document.getElementById('signupAge').value = '';
            document.getElementById('signupEmail').value = '';
            document.getElementById('signupPassword').value = '';
            document.getElementById('signupBio').value = '';
            selectedInterests = [];
            document.querySelectorAll('.interest-chip').forEach(c => c.classList.remove('selected'));
        } catch(e) { alert(e.message); }
    };
    
    document.getElementById('doLogin').onclick = async () => {
        const email = document.getElementById('loginEmail').value;
        const pwd = document.getElementById('loginPassword').value;
        try {
            const cred = await auth.signInWithEmailAndPassword(email, pwd);
            currentUser = cred.user;
            const doc = await db.collection('users').doc(currentUser.uid).get();
            if(!doc.exists) throw new Error('No profile');
            currentProfile = doc.data();
            if(!currentProfile.likes) currentProfile.likes = [];
            if(!currentProfile.matches) currentProfile.matches = [];
            if(!currentProfile.incomingLikes) currentProfile.incomingLikes = [];
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            updateProfileUI();
            loadCards();
            loadMatches();
        } catch(e) { alert('Login failed: '+e.message); }
    };
    
    auth.onAuthStateChanged(async user => {
        if(user && !currentUser) {
            currentUser = user;
            const doc = await db.collection('users').doc(user.uid).get();
            if(doc.exists) {
                currentProfile = doc.data();
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                updateProfileUI();
                loadCards();
                loadMatches();
            }
        }
    });

    // Dark mode
    const darkToggle = document.getElementById('darkModeToggle');
    if(localStorage.getItem('darkMode') === 'enabled') document.body.classList.add('dark');
    darkToggle.onclick = () => {
        document.body.classList.toggle('dark');
        localStorage.setItem('darkMode', document.body.classList.contains('dark') ? 'enabled' : 'disabled');
    };
    
    // Instructions for Firebase Rules
    console.log("%c🔧 IMPORTANT: To fix 'Missing or insufficient permissions', update Firebase Security Rules:\n\n1. Go to https://console.firebase.google.com\n2. Select your project 'teamup-68a21'\n3. Go to Firestore Database → Rules\n4. Replace with these rules:\n\nrules_version = '2';\nservice cloud.firestore {\n  match /databases/{database}/documents {\n    match /users/{userId} {\n      allow read, write: if request.auth != null;\n    }\n    match /matches/{matchId} {\n      allow read, write: if request.auth != null;\n    }\n    match /matches/{matchId}/messages/{message} {\n      allow read, write: if request.auth != null;\n    }\n  }\n}\n\n5. Click 'Publish'", "color: #ff6b6b; font-size: 12px; font-weight: bold; background: #1a1a2e; padding: 10px; border-radius: 8px;");
</script>
</body>
</html>
